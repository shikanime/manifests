---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-backup
  namespace: longhorn-system
spec:
  task: backup
  concurrency: 5
  cron: "0 4 * * *"
  retain: 7
  groups:
    - large
    - standard
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: hourly-snapshot
  namespace: longhorn-system
spec:
  task: snapshot
  concurrency: 5
  cron: "0 * * * *"
  retain: 24
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: monthly-backup
  namespace: longhorn-system
spec:
  task: backup
  concurrency: 5
  cron: "0 4 */28 * *"
  retain: 4
  groups:
    - large
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backup
  namespace: longhorn-system
spec:
  task: backup
  concurrency: 5
  cron: "0 4 */7 * *"
  retain: 4
  groups:
    - large
    - standard
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-filesystem-trim
  namespace: longhorn-system
spec:
  task: filesystem-trim
  concurrency: 5
  cron: "0 4 */7 * *"
  retain: 0
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-snapshot-cleanup
  namespace: longhorn-system
spec:
  task: snapshot-cleanup
  concurrency: 5
  cron: "0 4 */7 * *"
  retain: 0
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-snapshot-delete
  namespace: longhorn-system
spec:
  task: snapshot-delete
  concurrency: 5
  cron: "0 4 */7 * *"
  retain: 90
  groups:
    - default
