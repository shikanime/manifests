---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sUniqueServiceSelector
metadata:
  name: unique-service-selector
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups:
          - ""
        kinds:
          - Service
    namespaces:
      - shikanime
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: VerifyDeprecatedAPI
metadata:
  name: verify-deprecated-api
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups:
          - "*"
        kinds:
          - "*"
  parameters:
    k8sVersion: 1.35
    kvs:
      - deprecatedAPI: apps/v1beta1
        kinds:
          - Deployment
        targetAPI: apps/v1
      - deprecatedAPI: apps/v1beta2
        kinds:
          - Deployment
        targetAPI: apps/v1
      - deprecatedAPI: batch/v1beta1
        kinds:
          - CronJob
        targetAPI: batch/v1
      - deprecatedAPI: extensions/v1beta1
        kinds:
          - Deployment
          - Ingress
        targetAPI: None
      - deprecatedAPI: networking.k8s.io/v1beta1
        kinds:
          - Ingress
        targetAPI: networking.k8s.io/v1
      - deprecatedAPI: policy/v1beta1
        kinds:
          - PodDisruptionBudget
        targetAPI: policy/v1
