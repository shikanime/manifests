---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: discord
  namespace: flux-system
spec:
  eventSeverity: error
  eventSources:
    - name: "*"
      kind: GitRepository
    - name: "*"
      kind: HelmRelease
    - name: "*"
      kind: HelmRepository
    - name: "*"
      kind: Kustomization
  providerRef:
    name: discord
