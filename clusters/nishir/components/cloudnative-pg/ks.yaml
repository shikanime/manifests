apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudnative-pg
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/cloudnative-pg/base
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cloudnative-pg
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cloudnative-pg-config
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-cloudnative-pg
    - name: infrastructure-tailscale
  interval: 10m
  path: ./configs/cloudnative-pg/overlays/nishir
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: nishir
      namespace: shikanime
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
