---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-nfd
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/nfd/overlays/nishir
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - name: node-feature-discovery
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      namespace: flux-system
    - name: node-feature-discovery-config
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      namespace: flux-system
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
