apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-gatekeeper
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/gatekeeper/base
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: gatekeeper
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-gatekeeper-templates
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-gatekeeper
  interval: 10m
  path: ./clusters/nishir/components/gatekeeper/templates
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-gatekeeper-policies
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-gatekeeper-templates
  interval: 10m
  path: ./clusters/nishir/components/gatekeeper/policies
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
