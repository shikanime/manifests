apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-longhorn
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-tailscale
  interval: 10m
  path: ./infrastructure/longhorn/overlays/nishir
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: longhorn-hetzner-backups
      namespace: longhorn-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-longhorn-config
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-longhorn
  interval: 10m
  path: ./configs/longhorn/overlays/nishir
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
