apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sso-openldap
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-cert-manager
  interval: 10m
  path: ./apps/openldap/overlays/nishir
  prune: true
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: openldap
      namespace: shikanime
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sso-dex
  namespace: flux-system
spec:
  dependsOn:
    - name: sso-openldap
    - name: infrastructure-cert-manager
    - name: infrastructure-tailscale
  interval: 10m
  path: ./apps/dex/overlays/nishir-tailnet
  prune: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: dex
      namespace: shikanime
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
