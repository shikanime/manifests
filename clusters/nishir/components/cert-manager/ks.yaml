---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cert-manager
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/cert-manager/base
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - name: cert-manager
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      namespace: flux-system
    - name: trust-manager
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      namespace: flux-system
    - name: cert-manager-config
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      namespace: flux-system
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
