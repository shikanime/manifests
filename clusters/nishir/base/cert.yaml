apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nishir
spec:
  commonName: nishir
  dnsNames:
    - syncthing
    - syncthing.taila659a.ts.net
  issuerRef:
    name: nishir
    kind: ClusterIssuer
  secretName: nishir-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
