apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nishir
  namespace: kube-system
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
    - name: tcp
      port: 22000
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: All
