resources:
  - ../../base
  - ks.yaml
components:
  - ../../components/autoscaler
  - ../../components/cert-manager
  - ../../components/descheduler
  - ../../components/gatekeeper
  - ../../components/longhorn
  - ../../components/monitoring
  - ../../components/tailscale
  - ../../components/trust-manager
patches:
  - path: patch-ingress.yaml
labels:
  - includeTemplates: true
    pairs:
      app.kubernetes.io/component: cluster
      app.kubernetes.io/instance: nishir
      app.kubernetes.io/name: nishir
      app.kubernetes.io/part-of: nishir-infrastructure
      app.kubernetes.io/version: 0.0.0
secretGenerator:
  - name: discord-webhook
    namespace: flux-system
    envs:
      - discord-webhook/.enc.env
  - name: receiver-token
    namespace: flux-system
    envs:
      - receiver-token/.enc.env
