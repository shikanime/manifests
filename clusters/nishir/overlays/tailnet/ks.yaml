---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-bazarr
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infrastructure-autoscaler
    - name: infrastructure-cert-manager
    - name: infrastructure-tailscale
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: bazarr
      namespace: shikanime
  interval: 10m
  path: ./apps/bazarr/overlays/nishir-tailnet
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
