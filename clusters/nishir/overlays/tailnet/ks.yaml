apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-bazarr
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-longhorn
    - name: infrastructure-tailscale
  interval: 10m
  path: ./apps/bazarr/overlays/nishir-tailnet
  prune: true
  sourceRef:
    kind: GitRepository
    name: manifests
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
