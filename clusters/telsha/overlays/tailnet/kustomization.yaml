---
resources:
  - ../../base
  - ks.yaml
components:
  - ../../components/cert-manager
  - ../../components/cluster-api
  - ../../components/gatekeeper
  - ../../components/tailscale
  - ../../components/vpa
patches:
  - path: patch-ingress.yaml
secretGenerator:
  - name: discord-webhook
    namespace: flux-system
    envs:
      - discord-webhook/.enc.env
  - name: receiver-token
    namespace: flux-system
    envs:
      - receiver-token/.enc.env
labels:
  - includeTemplates: true
    pairs:
      app.kubernetes.io/component: cluster
      app.kubernetes.io/instance: telsha
      app.kubernetes.io/name: telsha
      app.kubernetes.io/part-of: telsha-infrastructure
      app.kubernetes.io/version: 0.0.0
