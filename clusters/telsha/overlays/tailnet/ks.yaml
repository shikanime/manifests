---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-catbox
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-vpa
  interval: 10m
  path: ./apps/catbox/overlays/telsha
  prune: true
  healthChecks:
    - name: catbox
      apiVersion: apps/v1
      kind: StatefulSet
      namespace: shikanime
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
