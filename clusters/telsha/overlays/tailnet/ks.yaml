apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-catbox
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-tailscale
  interval: 10m
  path: ./apps/catbox/overlays/telsha-tailnet
  prune: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: catbox
      namespace: shikanime
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-tailscale
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/tailscale/overlays/telsha
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: operator-oauth
      namespace: tailscale-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
