apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-catbox
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-tailscale
  interval: 10m
  path: ./apps/catbox/overlays/telsha-tailnet
  prune: true
  sourceRef:
    kind: GitRepository
    name: manifests
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-tailscale
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/tailscale/overlays/telsha
  prune: true
  sourceRef:
    kind: GitRepository
    name: manifests
  decryption:
    provider: sops
    secretRef:
      name: sops-age
