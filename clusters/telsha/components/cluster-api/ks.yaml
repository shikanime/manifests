apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cluster-api
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infrastructure-monitoring
  interval: 10m
  path: ./infrastructure/cluster-api/overlays/telsha
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
