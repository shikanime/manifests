apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-tailscale
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: operator-oauth
      namespace: tailscale-system
  interval: 10m
  path: ./infrastructure/tailscale/overlays/telsha
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
