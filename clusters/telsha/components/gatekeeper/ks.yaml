apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-gatekeeper
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  dependsOn:
    - name: infrastructure-cert-manager
    - name: infrastructure-monitoring
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: gatekeeper
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: gatekeeper-config
      namespace: flux-system
  interval: 10m
  path: ./infrastructure/gatekeeper/overlays/telsha
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
