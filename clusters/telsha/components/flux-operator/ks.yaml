---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-flux-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-tailscale
  interval: 10m
  path: ./infrastructure/flux-operator/base
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - name: flux
      apiVersion: tailscale.com/v1alpha1
      kind: ProxyClass
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
