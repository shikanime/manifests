apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-longhorn
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  interval: 10m
  path: ./infrastructure/longhorn/overlays/talashi-tailnet
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
