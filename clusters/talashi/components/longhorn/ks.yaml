apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-longhorn
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/longhorn/overlays/talashi-tailnet
  prune: true
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: longhorn-hetzner-backups
      namespace: longhorn-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: longhorn-config
      namespace: flux-system
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
