apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: tailscale-operator
  namespace: tailscale-system
  labels:
    app.kubernetes.io/name: tailscale-operator
    app.kubernetes.io/part-of: tailscale
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - tailscale-system
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-operator
