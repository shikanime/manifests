apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: descheduler
  namespace: descheduler-system
  labels:
    app.kubernetes.io/name: descheduler
    app.kubernetes.io/part-of: descheduler
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - descheduler-system
  selector:
    matchLabels:
      app: descheduler
      app.kubernetes.io/name: descheduler
