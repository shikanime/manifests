apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: flux-system
spec:
  chart:
    spec:
      chart: descheduler
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-descheduler
        namespace: flux-system
      version: 0.35.1
  interval: 10m
  releaseName: descheduler
  targetNamespace: kube-system
  values:
    deschedulerPolicy:
      metricsProviders:
        - source: KubernetesMetrics
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                podProtections:
                  extraEnabled:
                    - PodsWithoutPDB
                    - PodsWithPVC
                    - PodsWithResourceClaims
            - name: PodLifeTime
              args:
                maxPodLifeTimeSeconds: 3600
                states:
                  - Pending
                  - PodInitializing
            - name: RemoveFailedPods
              args:
                includingInitContainers: true
                reasons:
                  - ContainerCannotRun
                  - ContainerStatusUnknown
                  - CrashLoopBackOff
                  - CreateContainerConfigError
                  - CreateContainerError
                  - ErrImagePull
                  - Error
                  - FailedMount
                  - ImagePullBackOff
                  - RunContainerError
            - name: RemoveDuplicates
            - name: RemovePodsHavingTooManyRestarts
              args:
                includingInitContainers: true
                podRestartThreshold: 50
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - preferredDuringSchedulingIgnoredDuringExecution
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingNodeTaints
            - name: RemovePodsViolatingTopologySpreadConstraint
          plugins:
            deschedule:
              enabled:
                - PodLifeTime
                - RemoveFailedPods
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingInterPodAntiAffinity
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingNodeTaints
        - name: cpu
          pluginConfig:
            - name: DefaultEvictor
            - name: LowNodeUtilization
              args:
                metricsUtilization:
                  source: KubernetesMetrics
                targetThresholds:
                  cpu: 10
                thresholds:
                  cpu: 10
                useDeviationThresholds: true
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
        - name: memory
          pluginConfig:
            - name: DefaultEvictor
            - name: LowNodeUtilization
              args:
                metricsUtilization:
                  source: KubernetesMetrics
                targetThresholds:
                  memory: 5
                thresholds:
                  memory: 5
                useDeviationThresholds: true
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
        - name: spread
          pluginConfig:
            - name: DefaultEvictor
            - name: RemoveDuplicates
            - name: RemovePodsViolatingTopologySpreadConstraint
          plugins:
            balance:
              enabled:
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
