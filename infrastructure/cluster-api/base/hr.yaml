apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-api-operator
  namespace: flux-system
spec:
  chart:
    spec:
      chart: cluster-api-operator
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: cluster-api-operator
        namespace: flux-system
  install:
    createNamespace: true
  interval: 10m
  releaseName: cluster-api-operator
  targetNamespace: capi-operator-system
  values:
    cert-manager:
      enabled: true
    bootstrap:
      k0sproject-k0smotron: {}
    controlPlane:
      k0sproject-k0smotron: {}
    infrastructure:
      k0sproject-k0smotron: {}
