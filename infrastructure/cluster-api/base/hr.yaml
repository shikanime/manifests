apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-api-operator
  namespace: flux-system
spec:
  chart:
    spec:
      version: 0.27.0
      chart: cluster-api-operator
      interval: 1h
      sourceRef:
        name: cluster-api-operator
        kind: HelmRepository
        namespace: flux-system
  install:
    crds: Create
  interval: 10m
  releaseName: cluster-api-operator
  targetNamespace: capi-operator-system
  upgrade:
    crds: CreateReplace
  values:
    bootstrap:
      k0sproject-k0smotron: {}
    cert-manager:
      enabled: true
    controlPlane:
      k0sproject-k0smotron: {}
    infrastructure:
      hetzner: {}
      k0sproject-k0smotron: {}
