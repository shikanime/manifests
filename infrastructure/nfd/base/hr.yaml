---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfd
  namespace: flux-system
spec:
  chart:
    spec:
      version: 0.18.3
      chart: node-feature-discovery
      interval: 1h
      sourceRef:
        name: kubernetes-sigs-nfd
        kind: HelmRepository
        namespace: flux-system
  install:
    createNamespace: true
  interval: 10m
  releaseName: node-feature-discovery
  targetNamespace: kube-system
