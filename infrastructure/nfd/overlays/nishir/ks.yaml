---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nfd-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./configs/nfd/overlays/nishir
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
