apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  dependsOn:
    - name: infrastructure-cert-manager
  interval: 10m
  path: ./configs/cert-manager/overlays/telsha
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
