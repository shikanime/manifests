---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  chart:
    spec:
      version: v1.20.2
      chart: cert-manager
      interval: 1h
      sourceRef:
        name: jetstack
        kind: HelmRepository
        namespace: flux-system
  install:
    crds: Create
  interval: 10m
  releaseName: cert-manager
  targetNamespace: cert-manager-system
  upgrade:
    crds: CreateReplace
  values:
    clusterResourceNamespace: cert-manager-trust
    crds:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  chart:
    spec:
      version: v0.22.1
      chart: trust-manager
      interval: 1h
      sourceRef:
        name: jetstack
        kind: HelmRepository
        namespace: flux-system
  install:
    crds: Create
    createNamespace: true
  interval: 10m
  releaseName: trust-manager
  targetNamespace: cert-manager-system
  upgrade:
    crds: CreateReplace
  values:
    app:
      trust:
        namespace: cert-manager-trust
