apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
secretGenerator:
  - envs:
      - alloy-logs-remote-cfg-grafana-k8s-monitoring/.enc.env
    name: alloy-logs-remote-cfg-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - alloy-metrics-remote-cfg-grafana-k8s-monitoring/.enc.env
    name: alloy-metrics-remote-cfg-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - alloy-receiver-remote-cfg-grafana-k8s-monitoring/.enc.env
    name: alloy-receiver-remote-cfg-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - alloy-singleton-remote-cfg-grafana-k8s-monitoring/.enc.env
    name: alloy-singleton-remote-cfg-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - gc-otlp-endpoint-grafana-k8s-monitoring/.enc.env
    name: gc-otlp-endpoint-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - grafana-cloud-logs-grafana-k8s-monitoring/.enc.env
    name: grafana-cloud-logs-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
  - envs:
      - grafana-cloud-metrics-grafana-k8s-monitoring/.enc.env
    name: grafana-cloud-metrics-grafana-k8s-monitoring
    namespace: grafana-system
    options:
      disableNameSuffixHash: true
