---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gatekeeper-config
  namespace: flux-system
spec:
  dependsOn:
    - name: gatekeeper
  interval: 10m
  path: ./configs/gatekeeper/overlays/telsha
  prune: true
  deletionPolicy: Orphan
  sourceRef:
    name: flux-system
    kind: GitRepository
  decryption:
    provider: sops
    secretRef:
      name: sops-age
