apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-config
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  interval: 10m
  path: ./configs/longhorn/overlays/nishir
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
