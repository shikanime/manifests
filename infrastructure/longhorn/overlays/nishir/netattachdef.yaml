apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: longhorn-storage
  namespace: longhorn-system
spec:
  config: |-
    {
      "cniVersion": "0.4.0",
      "name": "longhorn-storage",
      "type": "bridge",
      "bridge": "br0",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.2.0/24",
        "range_end": "192.168.2.250"
      }
    }
