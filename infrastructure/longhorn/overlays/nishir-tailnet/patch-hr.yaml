apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  values:
    ingress:
      enabled: true
      ingressClassName: tailscale
      annotations:
        tailscale.com/tags: tag:web
      host: nishir-longhorn
  postRenderers:
    - kustomize:
        patches:
          - target:
              name: longhorn-ingress
              version: v1
              kind: Ingress
            patch: |
              - op: add
                path: /spec/tls
                pathType: Prefix
                value:
                  - hosts:
                      - nishir-longhorn
