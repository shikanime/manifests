apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system
      version: 0.80.0
  interval: 10m
  install:
    createNamespace: true
  releaseName: vmks
  targetNamespace: monitoring-system
  values:
    defaultDashboards:
      enabled: true
    grafana:
      enabled: true
      persistence:
        enabled: true
        size: 2Gi
        type: pvc
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: 30d
        storage:
          resources:
            requests:
              storage: 8Gi
