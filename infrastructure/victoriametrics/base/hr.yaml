apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  chart:
    spec:
      version: 0.80.0
      chart: victoria-metrics-k8s-stack
      interval: 1h
      sourceRef:
        name: vm
        kind: HelmRepository
        namespace: flux-system
  interval: 10m
  releaseName: vmks
  targetNamespace: monitoring-system
  install:
    createNamespace: true
  values:
    grafana:
      enabled: true
      persistence:
        type: pvc
        enabled: true
        size: 2Gi
    defaultDashboards:
      enabled: true
    vmsingle:
      spec:
        retentionPeriod: 30d
        storage:
          resources:
            requests:
              storage: 8Gi
      enabled: true
