apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tofu-controller-config
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  dependsOn:
    - name: infrastructure-tofu-controller
  interval: 10m
  path: ./infrastructure/tofu-controller/overlays/nishir-tailnet
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
