apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  values:
    grafana:
      ingress:
        annotations:
          tailscale.com/tags: tag:web
        enabled: true
        hosts:
          - talashi-grafana
        ingressClassName: tailscale
        path: /
        pathType: Prefix
        tls:
          - hosts:
              - talashi-grafana
