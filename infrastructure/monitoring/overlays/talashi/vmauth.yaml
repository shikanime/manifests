apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: vmauth
  namespace: monitoring-system
spec:
  approvePlan: auto
  interval: 1h
  path: ./modules/vmauth
  sourceRef:
    name: flux-system
    kind: GitRepository
    namespace: flux-system
  vars:
    - name: vmselect_url
      value: http://vmks-vmsingle.monitoring-system.svc:8428
    - name: vminsert_url
      value: http://vmks-vmsingle.monitoring-system.svc:8428
  writeOutputsToSecret:
    name: vmauth-outputs
