apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/tls
                value:
                  - hosts:
                      - telsha-telemetry
            target:
              name: vminsert-vmks-victoria-metrics-k8s-stack
              version: v1
              kind: Ingress
  values:
    grafana:
      persistence:
        storageClassName: local-path
    vmauth:
      spec:
        port: "8427"
        secretName: vmauth
      enabled: true
      ingress:
        annotations:
          tailscale.com/tags: tag:web
        enabled: true
        hosts:
          - telsha-vmauth
        ingressClassName: tailscale
        path: /
        pathType: Prefix
        tls:
          - hosts:
              - telsha-vmauth
    vmsingle:
      spec:
        extraArgs:
          enableTCP6: "true"
        storage:
          resources:
            requests:
              storage: 8Gi
          storageClassName: local-path
      ingress:
        annotations:
          tailscale.com/tags: tag:web
        enabled: true
        hosts:
          - telsha-telemetry
        ingressClassName: tailscale
