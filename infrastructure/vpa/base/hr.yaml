---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
  namespace: flux-system
spec:
  chart:
    spec:
      version: 4.10.2
      chart: vpa
      interval: 1h
      sourceRef:
        name: fairwinds-stable
        kind: HelmRepository
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  interval: 10m
  releaseName: vpa
  targetNamespace: kube-system
