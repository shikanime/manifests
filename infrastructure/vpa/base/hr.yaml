apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
  namespace: flux-system
spec:
  chart:
    spec:
      version: 4.11.0
      chart: vpa
      interval: 1h
      sourceRef:
        name: fairwinds-stable
        kind: HelmRepository
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  interval: 10m
  releaseName: vpa
  targetNamespace: autoscaler-system
  values:
    admissionController:
      generateCertificate: false
      tlsSecretKeys:
        - key: ca.crt
          path: caCert.pem
        - key: tls.crt
          path: serverCert.pem
        - key: tls.key
          path: serverKey.pem
