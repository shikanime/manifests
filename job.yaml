---
apiVersion: batch/v1
kind: Job
metadata:
  name: rclone-migration-shows
  namespace: shikanime
spec:
  template:
    spec:
      containers:
        - name: rclone
          image: rclone/rclone:latest
          args:
            - copy
            - /src/Videos/Shows
            - /dest
            - --progress
            - --ignore-existing
            - --verbose
          volumeMounts:
            - name: source-vol
              mountPath: /src
            - name: dest-vol
              mountPath: /dest
      restartPolicy: OnFailure
      volumes:
        - name: source-vol
          persistentVolumeClaim:
            claimName: sukebe-data
        - name: dest-vol
          persistentVolumeClaim:
            claimName: sukebe-shows-data
