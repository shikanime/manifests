---
apiVersion: batch/v1
kind: Job
metadata:
  name: rclone-migration-doujins
  namespace: shikanime
spec:
  backoffLimit: 6
  completionMode: NonIndexed
  completions: 1
  manualSelector: false
  parallelism: 1
  podReplacementPolicy: TerminatingOrFailed
  selector:
    matchLabels:
      batch.kubernetes.io/controller-uid: e586b86d-1fca-41d2-8462-a3daa75306f5
  suspend: false
  template:
    metadata:
      labels:
        batch.kubernetes.io/controller-uid: e586b86d-1fca-41d2-8462-a3daa75306f5
        batch.kubernetes.io/job-name: rclone-migration-doujins
        controller-uid: e586b86d-1fca-41d2-8462-a3daa75306f5
        job-name: rclone-migration-doujins
    spec:
      containers:
        - name: rclone
          image: rclone/rclone:latest
          imagePullPolicy: Always
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          args:
            - |
              # Copy top-level directories
              rclone copy /src /dest \
                --include "/{Games/**,Mangas/**,Photos/**}" \
                --progress --ignore-existing --verbose

              # Copy the nested Doujins folder to the root of the destination
              rclone copy /src/Videos/Doujins /dest/Doujins \
                --progress --ignore-existing --verbose
          command:
            - /bin/sh
            - -c
          volumeMounts:
            - name: source-vol
              mountPath: /src
            - name: dest-vol
              mountPath: /dest
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: nishir
      restartPolicy: OnFailure
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: source-vol
          persistentVolumeClaim:
            claimName: sukebe-data
        - name: dest-vol
          persistentVolumeClaim:
            claimName: sukebe-doujins-data
