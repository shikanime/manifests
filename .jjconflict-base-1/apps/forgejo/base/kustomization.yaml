apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "forgejo", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+-rootless)$" }, { "name": "rclone", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+.*)$" } ]'
configMapGenerator:
  - files:
      - rclone/rclone.conf
    name: forgejo-rclone
    namespace: shikanime
images:
  - name: rclone
    newName: rclone/rclone
    newTag: 1.72.0
  - name: forgejo
    newName: codeberg.org/forgejo/forgejo
    newTag: 14.0.2-rootless
labels:
  - pairs:
      app.kubernetes.io/component: version-control-server
      app.kubernetes.io/name: forgejo
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: v14.0.2
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
