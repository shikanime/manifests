apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  chart:
    spec:
      chart: cert-manager
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: v1.20.1
  install:
    createNamespace: true
  interval: 10m
  releaseName: cert-manager
  targetNamespace: cert-manager-system
  values:
    clusterResourceNamespace: cert-manager-trust
    crds:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: flux-system
spec:
  chart:
    spec:
      chart: trust-manager
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: v0.22.0
  install:
    createNamespace: true
  interval: 10m
  releaseName: trust-manager
  targetNamespace: cert-manager-system
  values:
    app:
      trust:
        namespace: cert-manager-trust
