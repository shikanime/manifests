apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent-honcho
spec:
  replicas: 1
  serviceName: hermes-agent-honcho
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent-honcho
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent-honcho
    spec:
      containers:
        - name: hermes-agent-honcho
          image: hermes-agent-honcho
          env:
            - name: AUTH_USE_AUTH
              value: "true"
            - name: LLM_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agent
                  key: GOOGLE_API_KEY
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HERMES_AGENT_POSTGRES_SERVICE_HOST):$(HERMES_AGENT_POSTGRES_SERVICE_PORT)/$(DB_NAME)
          envFrom:
            - secretRef:
                name: hermes-agent-honcho
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
