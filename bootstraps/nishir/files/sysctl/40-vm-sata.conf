# Flush very early to avoid saturating the USB/SATA bus
vm.dirty_background_ratio=2
# Expire dirty data quickly (5s) to prevent memory bloat
vm.dirty_expire_centisecs=500
# Tight limit on dirty pages to keep RAM available for pods
vm.dirty_ratio=8
# Frequent writeback cadence (2.5s)
vm.dirty_writeback_centisecs=250
# Support many mmap/large indices/filesystems
vm.max_map_count=262144
# Heuristic overcommit (0) to prevent the Pi from "locking up"
vm.overcommit_memory=0
# Disable readahead
vm.page-cluster=0
# Keep swappiness low to avoid Pi4 CPU death by ZRAM compression
vm.swappiness=10
# MAX pressure (1000) - Essential for the 4GB node to survive Longhorn
vm.vfs_cache_pressure=1000
# Watermark settings
vm.watermark_boost_factor=0
vm.watermark_scale_factor=125