# Start background writeback early to keep the NVMe queue moving
vm.dirty_background_ratio=3
# 10s expiration to balance data safety and performance
vm.dirty_expire_centisecs=1000
# Low dirty_ratio to prevent I/O stalls that could lag the K8s API
vm.dirty_ratio=10
# Writeback frequency (5s)
vm.dirty_writeback_centisecs=500
# Support many mmap/large indices/filesystems
vm.max_map_count=262144
# Heuristic overcommit (0) is safer for RPi stability
vm.overcommit_memory=0
# Disable readahead for lower latency
vm.page-cluster=0
# Swappiness 10 to minimize CPU-heavy ZRAM usage
vm.swappiness=10
# Moderate pressure (200) to keep Master Node metadata lean
vm.vfs_cache_pressure=200
# Watermark settings for RPi kernel stability
vm.watermark_boost_factor=0
vm.watermark_scale_factor=125
