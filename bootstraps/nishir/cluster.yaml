---
apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: nishir
spec:
  hosts:
    - files:
        - name: mac-randomization
          src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
        - name: systctl-k8s
          src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
        - name: systctl-network
          src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
        - name: systctl-vm
          src: files/sysctl/40-vm-nvme.conf
          dst: /etc/sysctl.d/40-vm.conf
        - name: tmpfiles
          src: files/tmpfiles/mnt-nishir-k0s.conf
          dst: /etc/tmpfiles.d/mnt-nishir-k0s.conf
        - name: networkd-dispatcher-tailscale
          src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          perm: "0755"
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y age dmsetup cryptsetup ethtool open-iscsi
              nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi5-large,node.kubernetes.io/instance-type=rpi5-large,node.longhorn.io/create-default-disk=false"
      noTaints: true
      role: controller+worker
      ssh:
        address: 100.65.153.31
        user: root
    - files:
        - name: mac-randomization
          src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
        - name: systctl-k8s
          src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
        - name: systctl-network
          src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
        - name: systctl-vm
          src: files/sysctl/40-vm-sata.conf
          dst: /etc/sysctl.d/40-vm.conf
        - name: tmpfiles
          src: files/tmpfiles/mnt-reimu-k0s.conf
          dst: /etc/tmpfiles.d/mnt-reimu-k0s.conf
        - name: networkd-dispatcher-tailscale
          src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          perm: "0755"
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y dmsetup cryptsetup ethtool open-iscsi
              nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi4-large,node.kubernetes.io/instance-type=rpi4-large,node.longhorn.io/create-default-disk=false"
      role: worker
      ssh:
        address: 100.94.149.17
        user: root
    - files:
        - name: mac-randomization
          src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
        - name: systctl-k8s
          src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
        - name: systctl-network
          src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
        - name: systctl-vm
          src: files/sysctl/40-vm-sata.conf
          dst: /etc/sysctl.d/40-vm.conf
        - name: tmpfiles
          src: files/tmpfiles/mnt-marisa-k0s.conf
          dst: /etc/tmpfiles.d/mnt-marisa-k0s.conf
        - name: networkd-dispatcher-tailscale
          src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          perm: "0755"
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y dmsetup cryptsetup ethtool open-iscsi
              nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi4-medium,node.kubernetes.io/instance-type=rpi4-medium,node.longhorn.io/create-default-disk=false"
      role: worker
      ssh:
        address: 100.95.57.59
        user: root
  k0s:
    version: v1.35.2+k0s.0
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: nishir
      spec:
        extensions:
          helm:
            repositories:
              - name: longhorn
                url: https://charts.longhorn.io
              - name: tofu-controller
                url: https://flux-iac.github.io/tofu-controller
            charts:
              - name: flux
                version: 0.46.0
                chartname: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
                namespace: flux-system
                values: |
                  instance:
                    distribution:
                      registry: ghcr.io/fluxcd
                      version: 2.x
                    kustomize:
                      patches:
                        - patch: |
                            - op: add
                              path: /spec/decryption
                              value:
                                provider: sops
                                secretRef:
                                  name: sops-age
                          target:
                            kind: Kustomization
                    sync:
                      kind: GitRepository
                      path: clusters/nishir/overlays/tailnet
                      ref: refs/heads/main
                      url: https://github.com/shikanime/manifests.git
              - name: flux-operator
                version: 0.46.0
                chartname: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
                namespace: flux-system
                values: |
                  healthcheck:
                    enabled: true
                  web:
                    config:
                      authentication:
                        type: Anonymous
                        anonymous:
                          username: admin
                          groups:
                            - system:masters
                    ingress:
                      enabled: true
                      className: tailscale
                      annotations:
                        tailscale.com/tags: tag:web
                      hosts:
                        - host: nishir-flux
                          paths:
                            - path: /
                              pathType: ImplementationSpecific
                      tls:
                        - hosts:
                            - nishir-flux
                    rbac:
                      createRoles: true
              - name: tofu-controller
                version: 0.16.2
                chartname: tofu-controller/tofu-controller
                namespace: flux-system
                values: |
                  awsPackage:
                    install: false
                  runner:
                    allowedNamespaces:
                      - flux-system
                      - shikanime
              - name: longhorn
                version: 1.11.1
                chartname: longhorn/longhorn
                namespace: longhorn-system
                values: |
                  csi:
                    attacherReplicaCount: 1
                    provisionerReplicaCount: 1
                    resizerReplicaCount: 1
                    snapshotterReplicaCount: 1
                  defaultSettings:
                    allowCollectingLonghornUsageMetrics: false
                    defaultDataLocality: best-effort
                    defaultReplicaCount: 2
                    replicaAutoBalance: best-effort
                  defaultBackupStore:
                    backupTarget: s3://shikanime-studio-nishir-longhorn-backups-e9750005@fsn1/
                    backupTargetCredentialSecret: longhorn-hetzner-backups
                  ingress:
                    enabled: true
                    ingressClassName: tailscale
                    annotations:
                      tailscale.com/tags: tag:web
                    host: nishir-longhorn
                    tls: true
                  longhornUI:
                    replicas: 1
                  persistence:
                    defaultClassReplicaCount: 2
                    defaultDiskSelector:
                      enable: true
                      selector: fast
                    defaultFsType: xfs
                    recurringJobSelector:
                      enable: true
                      jobList:
                        - name: standard
                          isGroup: true
        telemetry:
          enabled: false
