apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: nishir
spec:
  hosts:
    - files:
        - src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
          name: mac-randomization
        - src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
          name: systctl-k8s
        - src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
          name: systctl-network
        - src: files/sysctl/40-vm-nvme.conf
          dst: /etc/sysctl.d/40-vm.conf
          name: systctl-vm
        - src: files/tmpfiles/mnt-nishir-k0s.conf
          dst: /etc/tmpfiles.d/mnt-nishir-k0s.conf
          name: tmpfiles
        - src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          name: networkd-dispatcher-tailscale
          perm: '0755'
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y age dmsetup cryptsetup ethtool open-iscsi nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
            - k0s kubectl wait --for=create namespace/flux-system --timeout=300s
            - sh -c 'k0s kubectl -n flux-system get secret sops-age >/dev/null 2>&1 || (age-keygen | k0s kubectl -n flux-system create secret generic sops-age --from-file=age.agekey=/dev/stdin --dry-run=client -o yaml | k0s kubectl apply -f -)'
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi5-large,node.kubernetes.io/instance-type=rpi5-large,node.longhorn.io/create-default-disk=false"
      noTaints: true
      role: controller+worker
      ssh:
        address: 100.65.153.31
        user: root
    - files:
        - src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
          name: mac-randomization
        - src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
          name: systctl-k8s
        - src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
          name: systctl-network
        - src: files/sysctl/40-vm-sata.conf
          dst: /etc/sysctl.d/40-vm.conf
          name: systctl-vm
        - src: files/tmpfiles/mnt-reimu-k0s.conf
          dst: /etc/tmpfiles.d/mnt-reimu-k0s.conf
          name: tmpfiles
        - src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          name: networkd-dispatcher-tailscale
          perm: '0755'
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y dmsetup cryptsetup ethtool open-iscsi nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi4-large,node.kubernetes.io/instance-type=rpi4-large,node.longhorn.io/create-default-disk=false"
      role: worker
      ssh:
        address: 100.94.149.17
        user: root
    - files:
        - src: files/networkmanager/90-mac-randomization.conf
          dst: /etc/NetworkManager/conf.d/90-mac-randomization.conf
          name: mac-randomization
        - src: files/sysctl/10-k8s.conf
          dst: /etc/sysctl.d/10-k8s.conf
          name: systctl-k8s
        - src: files/sysctl/20-network.conf
          dst: /etc/sysctl.d/20-network.conf
          name: systctl-network
        - src: files/sysctl/40-vm-sata.conf
          dst: /etc/sysctl.d/40-vm.conf
          name: systctl-vm
        - src: files/tmpfiles/mnt-marisa-k0s.conf
          dst: /etc/tmpfiles.d/mnt-marisa-k0s.conf
          name: tmpfiles
        - src: files/networkd-dispatcher/50-tailscale
          dst: /etc/networkd-dispatcher/routable.d/50-tailscale
          name: networkd-dispatcher-tailscale
          perm: '0755'
      hooks:
        connect:
          after:
            - apt-get update
            - apt-get install -y dmsetup cryptsetup ethtool open-iscsi nfs-common networkd-dispatcher xfsprogs
            - systemd-tmpfiles --create
            - sysctl --system
      installFlags:
        - --labels="beta.kubernetes.io/instance-type=rpi4-medium,node.kubernetes.io/instance-type=rpi4-medium,node.longhorn.io/create-default-disk=false"
      role: worker
      ssh:
        address: 100.95.57.59
        user: root
  k0s:
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: nishir
      spec:
        extensions:
          helm:
            repositories:
              - name: jetstack
                url: https://charts.jetstack.io
              - name: kubernetes-sigs-nfd
                url: https://kubernetes-sigs.github.io/node-feature-discovery/charts
              - name: longhorn
                url: https://charts.longhorn.io
              - name: tailscale
                url: https://pkgs.tailscale.com/helmcharts
              - name: grafana
                url: https://grafana.github.io/helm-charts
            charts:
              - name: cert-manager
                chartname: jetstack/cert-manager
                version: v1.20.1
                namespace: cert-manager-system
                values: |
                  clusterResourceNamespace: cert-manager-trust
                  crds:
                    enabled: true
              - name: grafana-k8s-monitoring
                chartname: grafana/k8s-monitoring
                version: 3.8.4
                namespace: grafana-system
                values: |
                  cluster:
                    name: nishir
                  destinations:
                    - name: grafana-cloud-metrics
                      type: prometheus
                      url: https://prometheus-prod-01-eu-west-0.grafana.net./api/prom/push
                      auth:
                        type: basic
                      secret:
                        create: false
                    - name: grafana-cloud-logs
                      type: loki
                      url: https://logs-prod-eu-west-0.grafana.net./loki/api/v1/push
                      auth:
                        type: basic
                      secret:
                        create: false
                    - name: gc-otlp-endpoint
                      type: otlp
                      url: https://otlp-gateway-prod-eu-west-0.grafana.net./otlp
                      protocol: http
                      auth:
                        type: basic
                      secret:
                        create: false
                      metrics:
                        enabled: true
                      logs:
                        enabled: true
                      traces:
                        enabled: true
                  clusterMetrics:
                    enabled: true
                  clusterEvents:
                    enabled: true
                  podLogs:
                    enabled: true
                  applicationObservability:
                    enabled: true
                    receivers:
                      otlp:
                        grpc:
                          enabled: true
                          port: 4317
                        http:
                          enabled: true
                          port: 4318
                      zipkin:
                        enabled: true
                        port: 9411
                  alloy-metrics:
                    enabled: true
                    alloy:
                      extraEnv:
                        - name: GCLOUD_RW_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: alloy-metrics-remote-cfg-grafana-k8s-monitoring
                              key: password
                        - name: CLUSTER_NAME
                          value: nishir
                        - name: NAMESPACE
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.namespace
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.name
                        - name: GCLOUD_FM_COLLECTOR_ID
                          value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
                    remoteConfig:
                      enabled: true
                      url: https://fleet-management-prod-003.grafana.net
                      auth:
                        type: basic
                      secret:
                        create: false
                  alloy-singleton:
                    enabled: true
                    alloy:
                      extraEnv:
                        - name: GCLOUD_RW_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: alloy-singleton-remote-cfg-grafana-k8s-monitoring
                              key: password
                        - name: CLUSTER_NAME
                          value: nishir
                        - name: NAMESPACE
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.namespace
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.name
                        - name: GCLOUD_FM_COLLECTOR_ID
                          value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
                    remoteConfig:
                      enabled: true
                      url: https://fleet-management-prod-003.grafana.net
                      auth:
                        type: basic
                      secret:
                        create: false
                  alloy-logs:
                    enabled: true
                    alloy:
                      extraEnv:
                        - name: GCLOUD_RW_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: alloy-logs-remote-cfg-grafana-k8s-monitoring
                              key: password
                        - name: CLUSTER_NAME
                          value: nishir
                        - name: NAMESPACE
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.namespace
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.name
                        - name: NODE_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: spec.nodeName
                        - name: GCLOUD_FM_COLLECTOR_ID
                          value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-logs-$(NODE_NAME)
                    remoteConfig:
                      enabled: true
                      url: https://fleet-management-prod-003.grafana.net
                      auth:
                        type: basic
                      secret:
                        create: false
                  alloy-receiver:
                    enabled: true
                    alloy:
                      extraPorts:
                        - name: otlp-grpc
                          port: 4317
                          targetPort: 4317
                          protocol: TCP
                        - name: otlp-http
                          port: 4318
                          targetPort: 4318
                          protocol: TCP
                        - name: zipkin
                          port: 9411
                          targetPort: 9411
                          protocol: TCP
                      extraEnv:
                        - name: GCLOUD_RW_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: alloy-receiver-remote-cfg-grafana-k8s-monitoring
                              key: password
                        - name: CLUSTER_NAME
                          value: nishir
                        - name: NAMESPACE
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.namespace
                        - name: POD_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: metadata.name
                        - name: NODE_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: spec.nodeName
                        - name: GCLOUD_FM_COLLECTOR_ID
                          value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-receiver-$(NODE_NAME)
                    remoteConfig:
                      enabled: true
                      url: https://fleet-management-prod-003.grafana.net
                      auth:
                        type: basic
                      secret:
                        create: false
              - name: flux-operator
                chartname: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
                version: 0.46.0
                namespace: flux-system
                values: |
                  web:
                    config:
                      authentication:
                        type: Anonymous
                        anonymous:
                          username: admin
                          groups:
                            - system:masters
                    ingress:
                      enabled: true
                      className: tailscale
                      annotations:
                        tailscale.com/proxy-class: flux
                        tailscale.com/tags: tag:web
                      hosts:
                        - host: nishir-flux
                          paths:
                            - path: /
                              pathType: ImplementationSpecific
                      tls:
                        - hosts:
                            - nishir-flux
                    rbac:
                      createRoles: true
              - name: flux
                chartname: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
                version: 0.46.0
                namespace: flux-system
                values: |
                  instance:
                    distribution:
                      registry: ghcr.io/fluxcd
                      version: 2.x
                    kustomize:
                      patches:
                        - patch: |
                            - op: add
                              path: /spec/decryption
                              value:
                                provider: sops
                                secretRef:
                                  name: sops-age
                          target:
                            kind: Kustomization
                    sync:
                      kind: GitRepository
                      path: clusters/nishir/overlays/tailnet
                      ref: refs/heads/main
                      url: https://github.com/shikanime/manifests.git
              - name: tailscale-operator
                chartname: tailscale/tailscale-operator
                version: 1.94.2
                namespace: tailscale-system
                values: |
                  apiServerProxyConfig:
                    mode: "true"
                  operatorConfig:
                    hostname: nishir-k8s-operator
              - name: node-feature-discovery
                chartname: kubernetes-sigs-nfd/node-feature-discovery
                version: 0.18.3
                namespace: kube-system
              - name: longhorn
                chartname: longhorn/longhorn
                version: 1.11.1
                namespace: longhorn-system
                values: |
                  ingress:
                    enabled: true
                    ingressClassName: tailscale
                    annotations:
                      tailscale.com/proxy-class: longhorn
                      tailscale.com/tags: tag:web
                    host: nishir-longhorn
                    tls: true
                  defaultSettings:
                    allowCollectingLonghornUsageMetrics: false
                    defaultDataLocality: best-effort
                    defaultReplicaCount: 2
                    replicaAutoBalance: best-effort
                  defaultBackupStore:
                    backupTarget: s3://shikanime-studio-nishir-longhorn-backups-e9750005@fsn1/
                    backupTargetCredentialSecret: longhorn-hetzner-backups
                  persistence:
                    defaultClassReplicaCount: 2
                    defaultDiskSelector:
                      enable: true
                      selector: fast
                    defaultFsType: xfs
                    recurringJobSelector:
                      enable: true
                      jobList:
                        - name: standard
                          isGroup: true
              - name: trust-manager
                chartname: jetstack/trust-manager
                version: v0.22.0
                namespace: cert-manager-system
                values: |
                  app:
                    trust:
                      namespace: cert-manager-trust
        telemetry:
          enabled: false
    version: v1.35.2+k0s.0
