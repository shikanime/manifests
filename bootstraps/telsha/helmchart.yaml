apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux
  namespace: kube-system
spec:
  chart: flux-instance
  createNamespace: true
  repo: oci://ghcr.io/controlplaneio-fluxcd/charts
  targetNamespace: flux-system
  version: 0.46.0
  valuesContent: |
    instance:
      distribution:
        registry: ghcr.io/fluxcd
        version: 2.x
      kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/decryption
                value:
                  provider: sops
                  secretRef:
                    name: sops-age
            target:
              kind: Kustomization
      sync:
        interval: 1m
        kind: GitRepository
        path: clusters/telsha/overlays/tailnet
        pullSecret: ""
        ref: refs/heads/main
        url: https://github.com/shikanime/manifests.git
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux-operator
  namespace: kube-system
spec:
  chart: flux-operator
  createNamespace: true
  repo: oci://ghcr.io/controlplaneio-fluxcd/charts
  targetNamespace: flux-system
  version: 0.46.0
  valuesContent: |
    healthcheck:
      enabled: true
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: admin
            groups:
              - system:masters
      rbac:
        createRoles: true
