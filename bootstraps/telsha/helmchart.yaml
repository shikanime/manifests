apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  chart: cert-manager
  createNamespace: true
  repo: https://charts.jetstack.io
  targetNamespace: cert-manager-system
  valuesContent: |
    crds:
      enabled: true
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cluster-api-operator
  namespace: kube-system
spec:
  chart: cluster-api-operator
  createNamespace: true
  repo: https://kubernetes-sigs.github.io/cluster-api-operator
  targetNamespace: capi-operator-system
  valuesContent: |
    cert-manager:
      enabled: true
    bootstrap:
      k0sproject-k0smotron: {}
    controlPlane:
      k0sproject-k0smotron: {}
    infrastructure:
      k0sproject-k0smotron: {}
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux-instance
  namespace: kube-system
spec:
  chart: flux-instance
  createNamespace: true
  repo: oci://ghcr.io/controlplaneio-fluxcd/charts
  targetNamespace: flux-system
  version: 0.46.0
  valuesContent: |
    instance:
      distribution:
        registry: ghcr.io/fluxcd
        version: 2.x
      kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/decryption
                value:
                  provider: sops
                  secretRef:
                    name: sops-age
            target:
              kind: Kustomization
      sync:
        interval: 1m
        kind: GitRepository
        path: clusters/telsha/overlays/tailnet
        pullSecret: ""
        ref: refs/heads/main
        url: https://github.com/shikanime/manifests.git
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux-operator
  namespace: kube-system
spec:
  chart: flux-operator
  createNamespace: true
  repo: oci://ghcr.io/controlplaneio-fluxcd/charts
  targetNamespace: flux-system
  version: 0.46.0
  valuesContent: |
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: admin
            groups:
              - system:masters
      rbac:
        createRoles: true
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tailscale-operator
  namespace: kube-system
spec:
  chart: tailscale-operator
  createNamespace: true
  repo: https://pkgs.tailscale.com/helmcharts
  targetNamespace: tailscale-system
  valuesContent: |
    operatorConfig:
      hostname: telsha-k8s-operator
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: vpa
  namespace: kube-system
spec:
  chart: vpa
  createNamespace: true
  repo: https://charts.fairwinds.com/stable
  targetNamespace: vpa-system
