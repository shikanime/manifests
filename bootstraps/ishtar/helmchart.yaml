---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux
  namespace: kube-system
spec:
  version: 0.46.0
  chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
  createNamespace: true
  targetNamespace: flux-system
  valuesContent: |
    instance:
      distribution:
        registry: ghcr.io/fluxcd
        version: 2.x
      kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/decryption
                value:
                  provider: sops
                  secretRef:
                    name: sops-age
            target:
              kind: Kustomization
      sync:
        interval: 1m
        kind: GitRepository
        path: clusters/ishtar/overlays/tailnet
        pullSecret: ""
        ref: refs/heads/main
        url: https://github.com/shikanime/manifests.git
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: flux-operator
  namespace: kube-system
spec:
  version: 0.46.0
  chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  createNamespace: true
  targetNamespace: flux-system
  valuesContent: |
    healthcheck:
      enabled: true
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: admin
            groups:
              - system:masters
      ingress:
        enabled: true
        className: tailscale
        annotations:
          tailscale.com/tags: tag:web
        hosts:
          - host: ishtar-flux
            paths:
              - path: /
                pathType: ImplementationSpecific
        tls:
          - hosts:
              - ishtar-flux
      rbac:
        createRoles: true
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tofu-controller
  namespace: kube-system
spec:
  version: 0.16.2
  chart: tofu-controller
  createNamespace: true
  repo: https://flux-iac.github.io/tofu-controller
  targetNamespace: flux-system
  valuesContent: |
    awsPackage:
      install: false
    runner:
      allowedNamespaces:
        - flux-system
        - shikanime
