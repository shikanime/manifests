apiVersion: skaffold/v4beta9
kind: Config
metadata:
  name: shikanime
build:
  artifacts:
  - image: ghcr.io/shikanime/shikanime/syncthing
    custom:
      buildCommand: |
        docker load -i <(nix build $BUILD_CONTEXT#syncthing- --paths)
        if $PUSH_IMAGE; then docker push $IMAGE; fi
profiles:
  - name: nishir-tailnet
    manifests:
      kustomize:
        paths:
          - clusters/nishir/overlays/tailnet
