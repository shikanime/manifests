---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: copyparty
spec:
  template:
    spec:
      containers:
        - name: copyparty
          volumeMounts:
            - name: archives-data
              mountPath: /data/archives
            - name: movies-data
              mountPath: /data/movies
              subPath: Movies
            - name: music-data
              mountPath: /data/music
              subPath: Music
            - name: shows-data
              mountPath: /data/shows
              subPath: Shows
            - name: staging-data
              mountPath: /data/staging
              subPath: Staging
            - name: sukebe-data
              mountPath: /data/sukebe
              subPath: Sukebe
            - name: sync-data
              mountPath: /data/sync
            - name: timeline-data
              mountPath: /data/timeline
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: copyparty-config
        - name: archives-data
          persistentVolumeClaim:
            claimName: archives-data
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: music-data
          persistentVolumeClaim:
            claimName: music-data
        - name: shows-data
          persistentVolumeClaim:
            claimName: shows-data
        - name: staging-data
          persistentVolumeClaim:
            claimName: staging-data
        - name: sukebe-data
          persistentVolumeClaim:
            claimName: sukebe-data
        - name: sync-data
          persistentVolumeClaim:
            claimName: sync-data
        - name: timeline-data
          persistentVolumeClaim:
            claimName: timeline-data
        - name: startup-config
          configMap:
            name: copyparty
