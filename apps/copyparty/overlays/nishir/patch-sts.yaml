---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: copyparty
spec:
  template:
    spec:
      containers:
        - name: copyparty
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: archives-data
              mountPath: /data/archives
            - name: downloads-data
              mountPath: /data/downloads
            - name: movies-data
              mountPath: /data/movie
            - name: music-data
              mountPath: /var/syncthing/Musics
            - name: shows-data
              mountPath: /data/shows
            - name: staging-data
              mountPath: /data/staging
            - name: sukebe-data
              mountPath: /data/sukebe
            - name: sync-data
              mountPath: /data/sync
            - name: timeline-data
              mountPath: /data/timeline
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: copyparty-config
        - name: certs
          configMap:
            name: nishir-ca-certificates.crt
        - name: archives-data
          persistentVolumeClaim:
            claimName: archives-data
        - name: downloads-data
          persistentVolumeClaim:
            claimName: downloads-data
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: music-data
          persistentVolumeClaim:
            claimName: music-data
        - name: shows-data
          persistentVolumeClaim:
            claimName: shows-data
        - name: staging-data
          persistentVolumeClaim:
            claimName: staging-data
        - name: sukebe-data
          persistentVolumeClaim:
            claimName: sukebe-data
        - name: sync-data
          persistentVolumeClaim:
            claimName: sync-data
        - name: timeline-data
          persistentVolumeClaim:
            claimName: timeline-data
        - name: startup-config
          configMap:
            name: copyparty
