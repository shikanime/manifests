---
resources:
  - ingress.yaml
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "copyparty", "tag-regex": "^(?P<version>.+)$" }, { "name":
      "rclone", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
images:
  - name: copyparty
    newName: copyparty/dj
    newTag: 1.20.0
  - name: rclone
    newName: rclone/rclone
    newTag: 1.72.0
configMapGenerator:
  - name: copyparty-rclone
    namespace: shikanime
    files:
      - rclone/rclone.conf
