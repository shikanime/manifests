---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qbittorrent-resume
spec:
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: qbittorrent-resume
            app.kubernetes.io/name: qbittorrent-resume
        spec:
          containers:
            - name: qbittorrent-resume
              image: qbittorrent-resume
              env:
                - name: QBT_URL
                  value: https://$(QBITTORRENT_SERVICE_HOST):$(QBITTORRENT_SERVICE_PORT)
              envFrom:
                - secretRef:
                    name: qbittorrent-resume
          restartPolicy: Never
  schedule: "*/2 * * * *"
