apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chrome
    spec:
      containers:
        - name: chrome
          image: chrome
          args:
            - --remote-debugging-address=0.0.0.0
            - --remote-allow-origins=*
          ports:
            - containerPort: 9222
              name: cdp
          readinessProbe:
            tcpSocket:
              port: cdp
            initialDelaySeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: cdp
            initialDelaySeconds: 30
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: cdp
            initialDelaySeconds: 3
            timeoutSeconds: 5
            failureThreshold: 180
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
