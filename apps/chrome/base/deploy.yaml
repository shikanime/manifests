apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chrome
    spec:
      containers:
        - name: chrome
          image: chrome
          args:
            - --remote-debugging-address=0.0.0.0
            - --remote-allow-origins=*
          ports:
            - containerPort: 9222
              name: cdp
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
