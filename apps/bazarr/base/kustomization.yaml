---
resources:
  - ingress.yaml
  - netpol.yaml
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "rclone", "tag-regex":
      "^(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)$" }, { "name":
      "bazarr", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
images:
  - name: bazarr
    newName: lscr.io/linuxserver/bazarr
    newTag: 1.5.3
  - name: rclone
    newName: rclone/rclone
    newTag: 1.71.2
configMapGenerator:
  - name: bazarr-rclone
    namespace: shikanime
    files:
      - rclone/rclone.conf
labels:
  - includeTemplates: true
    includeVolumeClaimTemplates: true
    pairs:
      app.kubernetes.io/component: library-manager
      app.kubernetes.io/instance: bazarr
      app.kubernetes.io/name: bazarr
      app.kubernetes.io/part-of: nishir-media
      app.kubernetes.io/version: 1.5.3
