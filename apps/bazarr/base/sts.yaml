apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: bazarr
      app.kubernetes.io/name: bazarr
  serviceName: bazarr
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: bazarr
        app.kubernetes.io/name: bazarr
    spec:
      containers:
        - name: bazarr
          image: bazarr
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
          livenessProbe:
            initialDelaySeconds: 60
            tcpSocket:
              port: http
            timeoutSeconds: 5
          ports:
            - name: http
              containerPort: 6767
          readinessProbe:
            initialDelaySeconds: 30
            tcpSocket:
              port: http
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 180
            periodSeconds: 10
            tcpSocket:
              port: http
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: run
              mountPath: /run
          securityContext:
            capabilities:
              add:
                - CHOWN
                - FOWNER
                - SETGID
                - SETUID
      initContainers:
        - name: config-sync
          image: rclone
          args:
            - copyto
            - --copy-links
            - /mnt/startup-config/config.yaml
            - /mnt/config/config.yaml
          command:
            - rclone
          volumeMounts:
            - name: config
              mountPath: /mnt/config
            - name: rclone-config
              mountPath: /config/rclone/rclone.conf
              readOnly: true
              subPath: rclone.conf
            - name: startup-config
              mountPath: /mnt/startup-config
              readOnly: true
          securityContext:
            capabilities:
              add:
                - FOWNER
      securityContext:
        fsGroup: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: rclone-config
          configMap:
            name: bazarr-rclone
        - name: run
          emptyDir:
            medium: Memory
        - name: startup-config
          secret:
            secretName: bazarr
