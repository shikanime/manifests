---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho-postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: honcho-postgres
      app.kubernetes.io/name: honcho-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: honcho
      ports:
        - port: postgres
