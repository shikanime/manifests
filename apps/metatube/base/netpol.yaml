apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metatube
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jellyfin
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: metatube
      app.kubernetes.io/name: metatube
  policyTypes:
    - Ingress
