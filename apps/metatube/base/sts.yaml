apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metatube
spec:
  replicas: 1
  serviceName: metatube
  selector:
    matchLabels:
      app.kubernetes.io/name: metatube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metatube
    spec:
      containers:
        - name: metatube
          image: metatube
          args:
            - -dsn
            - /data/metatube.db
          envFrom:
            - secretRef:
                name: metatube
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 180
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metatube-data
