apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metatube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: metatube
      app.kubernetes.io/name: metatube
  serviceName: metatube
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: metatube
        app.kubernetes.io/name: metatube
    spec:
      containers:
        - name: metatube
          image: metatube
          args:
            - -dsn
            - /data/metatube.db
          env:
            - name: HTTP_PROXY
              value: https://secure.mse.waseda.ac.jp
            - name: HTTPS_PROXY
              value: https://secure.mse.waseda.ac.jp
          livenessProbe:
            initialDelaySeconds: 60
            tcpSocket:
              port: http
            timeoutSeconds: 5
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            initialDelaySeconds: 30
            tcpSocket:
              port: http
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 180
            tcpSocket:
              port: http
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          envFrom:
            - secretRef:
                name: metatube
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metatube-data
