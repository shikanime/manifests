apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seerr
spec:
  template:
    spec:
      containers:
        - name: seerr
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca-certificates.crt
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
