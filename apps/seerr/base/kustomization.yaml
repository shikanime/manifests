apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "seerr", "tag-regex": "^v(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
images:
  - name: seerr
    newName: ghcr.io/seerr-team/seerr
    newTag: v3.1.0
labels:
  - pairs:
      app.kubernetes.io/component: library-manager
      app.kubernetes.io/name: seerr
      app.kubernetes.io/part-of: nishir-media
      app.kubernetes.io/version: v3.1.0
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
