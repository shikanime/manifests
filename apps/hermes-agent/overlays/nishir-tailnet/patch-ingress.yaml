---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automata
  annotations:
    tailscale.com/proxy-class: automata
    tailscale.com/tags: tag:web
spec:
  ingressClassName: tailscale
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automata-webhook
  annotations:
    tailscale.com/funnel: "true"
    tailscale.com/proxy-class: automata-webhook
    tailscale.com/tags: tag:web
spec:
  ingressClassName: tailscale
