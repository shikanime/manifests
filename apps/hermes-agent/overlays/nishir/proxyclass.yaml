metadata:
  name: automata
spec:
  statefulSet:
    pod:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: hermes-agent
              namespaces:
                - shikanime
              topologyKey: kubernetes.io/hostname
