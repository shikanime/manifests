apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shikanime
components:
  - ../../components/api
  - ../../components/browser
  - ../../components/honcho
  - ../../components/webhook
patches:
  - path: patch-pvc.yaml
configMapGenerator:
  - files:
      - hermes-agent/config.yaml
      - hermes-agent/honcho.json
      - hermes-agent/SOUL.md
    name: hermes-agent-startup-config
resources:
  - ../../base
secretGenerator:
  - envs:
      - hermes-agent/.enc.env
    name: hermes-agent
