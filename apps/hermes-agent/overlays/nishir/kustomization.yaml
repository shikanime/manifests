apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shikanime
components:
  - ../../components/api
  - ../../components/browser
  - ../../components/honcho
  - ../../components/postgres
  - ../../components/webhook
configMapGenerator:
  - files:
      - hermes-agent/config.yaml
      - hermes-agent/SOUL.md
    name: hermes-agent-startup-config
resources:
  - ../../base
  - pvc.yaml
secretGenerator:
  - envs:
      - hermes-agent/.enc.env
    name: hermes-agent
  - envs:
      - hermes-agent-postgres/.enc.env
    name: hermes-agent-postgres
    type: basic-auth
