apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-data
spec:
  accessModes:
    - ReadWriteOncePod
  resources:
    requests:
      storage: 512Mi
  storageClassName: nishir-fast
  volumeMode: Filesystem
  volumeName: hermes-agent-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
