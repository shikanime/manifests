apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent
spec:
  replicas: 1
  serviceName: hermes-agent
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
    spec:
      initContainers:
        - name: hermes-setup
          image: hermes-agent
          args:
            - setup
            - --non-interactive
          envFrom:
            - secretRef:
                name: hermes-agent
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes-agent
          image: hermes-agent
          args:
            - gateway
            - run
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: WEBHOOK_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: hermes-agent
          ports:
            - name: api
              containerPort: 8642
            - name: webhook
              containerPort: 8644
          startupProbe:
            httpGet:
              path: /health
              port: api
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: api
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: api
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
