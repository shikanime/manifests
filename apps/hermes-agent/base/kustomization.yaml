apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "hermes-agent", "tag-regex": "^(?P<version>.+)$" }, { "name": "chrome", "tag-regex": "^(?P<version>.+)$" } ]'
images:
  - name: rclone
    newName: docker.io/rclone/rclone
    newTag: 1.71.2
  - name: hermes-agent
    newName: docker.io/nousresearch/hermes-agent
    newTag: latest # TODO: the ARM64 image just released
  - name: chrome
    newName: docker.io/browserless/chrome
    newTag: 1.61.1-chrome-stable
labels:
  - pairs:
      app.kubernetes.io/component: agent
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: latest
resources:
  - deploy.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
