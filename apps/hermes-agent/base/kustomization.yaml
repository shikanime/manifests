apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "hermes-agent", "tag-regex": "^(?P<version>.+)$" } ]'
configMapGenerator:
  - files:
      - rclone/rclone.conf
    name: hermes-agent-rclone
images:
  - name: rclone
    newName: rclone/rclone
    newTag: 1.71.2
  - name: hermes-agent
    newName: nousresearch/hermes-agent
    newTag: latest # TODO: the ARM64 image just released
labels:
  - pairs:
      app.kubernetes.io/component: agent
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: latest
resources:
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
secretGenerator:
  - files:
      - id_ed25519=hermes-agent/id_ed25519.enc
    name: hermes-agent-ssh
    options:
      disableNameSuffixHash: true
