---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automata
  annotations:
    tailscale.com/tags: tag:web
spec:
  defaultBackend:
    service:
      name: hermes-agent-gateway
      port:
        name: http
  tls:
    - hosts:
        - automata
  ingressClassName: tailscale
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automata-webhook
  annotations:
    tailscale.com/funnel: "true"
    tailscale.com/tags: tag:web
spec:
  defaultBackend:
    service:
      name: hermes-agent-gateway
      port:
        name: webhook
  tls:
    - hosts:
        - automata-webhook
  ingressClassName: tailscale
