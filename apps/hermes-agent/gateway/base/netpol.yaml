apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agent-gateway
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hermes-agent
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: hermes-agent-gateway
      app.kubernetes.io/name: hermes-agent
  policyTypes:
    - Ingress
