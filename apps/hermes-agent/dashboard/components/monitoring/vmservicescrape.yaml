apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: dashboard
  namespace: shikanime
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: dashboard
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: dashboard
      app.kubernetes.io/name: dashboard
