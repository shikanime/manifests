apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: hermes-agent-dashboard
  namespace: shikanime
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/part-of: hermes-agent
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: http
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: hermes-agent-dashboard
      app.kubernetes.io/name: hermes-agent