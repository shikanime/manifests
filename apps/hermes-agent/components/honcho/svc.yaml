apiVersion: v1
kind: Service
metadata:
  name: honcho
spec:
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    app.kubernetes.io/name: honcho
---
apiVersion: v1
kind: Service
metadata:
  name: honcho-postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: honcho-postgres
