apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent
spec:
  template:
    spec:
      containers:
        - name: hermes-agent
          env:
            - name: HONCHO_BASE_URL
              value: http://$(HERMES_AGENT_HONCHO_SERVICE_HOST):$(HERMES_AGENT_HONCHO_SERVICE_PORT)
            - name: HONCHO_API_KEY
              value: local
