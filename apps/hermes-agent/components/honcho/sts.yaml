apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: honcho-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-postgres
  serviceName: honcho-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-postgres
    spec:
      containers:
        - name: postgres
          image: honcho-postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: password
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: initdb
          configMap:
            name: honcho-postgres
            items:
              - key: init.sql
                path: init.sql
        - name: data
          persistentVolumeClaim:
            claimName: honcho-postgres-data
