apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho
    spec:
      containers:
        - name: honcho
          image: honcho
          env:
            - name: AUTH_USE_AUTH
              value: "true"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HONCHO_POSTGRES_SERVICE_HOST):$(HONCHO_POSTGRES_SERVICE_PORT)/$(DB_NAME)
          envFrom:
            - secretRef:
                name: hermes-agent
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
