apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent
spec:
  template:
    spec:
      containers:
        - name: hermes-agent
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
          ports:
            - name: api
              containerPort: 8642
