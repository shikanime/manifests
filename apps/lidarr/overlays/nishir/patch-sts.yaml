---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lidarr
spec:
  template:
    spec:
      containers:
        - name: lidarr
          volumeMounts:
            - name: music-data
              mountPath: /data/music
              subPath: Music
            - name: music-data
              mountPath: /downloads
              subPath: Staging
      volumes:
        - name: music-data
          persistentVolumeClaim:
            claimName: music-data
