apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: honcho
  namespace: shikanime
  labels:
    app.kubernetes.io/name: honcho
    app.kubernetes.io/part-of: honcho
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: honcho
      app.kubernetes.io/name: honcho
