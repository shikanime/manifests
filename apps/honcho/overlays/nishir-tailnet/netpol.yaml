apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho-tailscale
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale-system
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: honcho
      app.kubernetes.io/name: honcho
  policyTypes:
    - Ingress
