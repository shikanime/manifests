apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: honcho
  annotations:
    tailscale.com/proxy-class: honcho
    tailscale.com/tags: tag:web
spec:
  defaultBackend:
    service:
      name: honcho
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - honcho
