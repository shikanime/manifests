apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: honcho
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hermes-agent
      ports:
        - port: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nishir
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: nishir
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: honcho
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale-system
      ports:
        - port: 5432
