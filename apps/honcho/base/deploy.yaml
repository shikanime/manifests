---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho
    spec:
      initContainers:
        - name: alembic-upgrade
          image: honcho
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - secretRef:
                name: honcho
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HERMES_AGENT_POSTGRES_SERVICE_HOST):$(HERMES_AGENT_POSTGRES_SERVICE_PORT)/$(DB_NAME)
      containers:
        - name: honcho
          image: honcho
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            failureThreshold: 180
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          envFrom:
            - secretRef:
                name: honcho
          env:
            - name: DERIVER_PROVIDER
              value: google
            - name: DERIVER_MODEL
              value: gemini-3.1-flash-lite-preview
            - name: DERIVER_THINKING_BUDGET_TOKENS
              value: "1024"
            - name: SUMMARY_PROVIDER
              value: google
            - name: SUMMARY_MODEL
              value: gemini-3-flash-preview
            - name: SUMMARY_THINKING_BUDGET_TOKENS
              value: "512"
            - name: DREAM_PROVIDER
              value: google
            - name: DREAM_MODEL
              value: gemini-3.1-pro-preview
            - name: DREAM_THINKING_BUDGET_TOKENS
              value: "8192"
            - name: DREAM_DEDUCTION_MODEL
              value: gemini-3-flash-preview
            - name: DREAM_INDUCTION_MODEL
              value: gemini-3-flash-preview
            - name: DIALECTIC_LEVELS__minimal__PROVIDER
              value: google
            - name: DIALECTIC_LEVELS__minimal__MODEL
              value: gemini-3.1-flash-lite-preview
            - name: DIALECTIC_LEVELS__minimal__THINKING_BUDGET_TOKENS
              value: "0"
            - name: DIALECTIC_LEVELS__minimal__MAX_TOOL_ITERATIONS
              value: "10"
            - name: DIALECTIC_LEVELS__low__PROVIDER
              value: google
            - name: DIALECTIC_LEVELS__low__MODEL
              value: gemini-3.1-flash-lite-preview
            - name: DIALECTIC_LEVELS__low__THINKING_BUDGET_TOKENS
              value: "0"
            - name: DIALECTIC_LEVELS__low__MAX_TOOL_ITERATIONS
              value: "12"
            - name: DIALECTIC_LEVELS__medium__PROVIDER
              value: google
            - name: DIALECTIC_LEVELS__medium__MODEL
              value: gemini-3-flash-preview
            - name: DIALECTIC_LEVELS__medium__THINKING_BUDGET_TOKENS
              value: "1024"
            - name: DIALECTIC_LEVELS__medium__MAX_TOOL_ITERATIONS
              value: "15"
            - name: DIALECTIC_LEVELS__high__PROVIDER
              value: google
            - name: DIALECTIC_LEVELS__high__MODEL
              value: gemini-3.1-pro-preview
            - name: DIALECTIC_LEVELS__high__THINKING_BUDGET_TOKENS
              value: "1024"
            - name: DIALECTIC_LEVELS__high__MAX_TOOL_ITERATIONS
              value: "20"
            - name: DIALECTIC_LEVELS__max__PROVIDER
              value: google
            - name: DIALECTIC_LEVELS__max__MODEL
              value: gemini-3.1-pro-preview
            - name: DIALECTIC_LEVELS__max__THINKING_BUDGET_TOKENS
              value: "2048"
            - name: DIALECTIC_LEVELS__max__MAX_TOOL_ITERATIONS
              value: "30"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HERMES_AGENT_POSTGRES_SERVICE_HOST):$(HERMES_AGENT_POSTGRES_SERVICE_PORT)/$(DB_NAME)
            - name: AUTH_USE_AUTH
              value: "false"
