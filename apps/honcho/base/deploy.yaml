apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: honcho
      app.kubernetes.io/name: honcho
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: honcho
        app.kubernetes.io/name: honcho
    spec:
      initContainers:
        - name: alembic-upgrade
          image: honcho
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - secretRef:
                name: honcho
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HONCHO_POSTGRES_SERVICE_HOST):$(HONCHO_POSTGRES_SERVICE_PORT)/$(DB_NAME)
      containers:
        - name: honcho
          image: honcho
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            failureThreshold: 180
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          envFrom:
            - secretRef:
                name: honcho
          env:
            - name: DERIVER_PROVIDER
              value: openrouter
            - name: DERIVER_MODEL
              value: openrouter/owl-alpha
            - name: DERIVER_THINKING_BUDGET_TOKENS
              value: "1024"
            - name: SUMMARY_PROVIDER
              value: openrouter
            - name: SUMMARY_MODEL
              value: openrouter/owl-alpha
            - name: SUMMARY_THINKING_BUDGET_TOKENS
              value: "512"
            - name: DREAM_PROVIDER
              value: openrouter
            - name: DREAM_MODEL
              value: openrouter/owl-alpha
            - name: DREAM_THINKING_BUDGET_TOKENS
              value: "8192"
            - name: DREAM_DEDUCTION_MODEL
              value: openrouter/owl-alpha
            - name: DREAM_INDUCTION_MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__minimal__PROVIDER
              value: openai
            - name: DIALECTIC_LEVELS__minimal__MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__minimal__THINKING_BUDGET_TOKENS
              value: "0"
            - name: DIALECTIC_LEVELS__minimal__MAX_TOOL_ITERATIONS
              value: "10"
            - name: DIALECTIC_LEVELS__low__PROVIDER
              value: openai
            - name: DIALECTIC_LEVELS__low__MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__low__THINKING_BUDGET_TOKENS
              value: "0"
            - name: DIALECTIC_LEVELS__low__MAX_TOOL_ITERATIONS
              value: "12"
            - name: DIALECTIC_LEVELS__medium__PROVIDER
              value: openai
            - name: DIALECTIC_LEVELS__medium__MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__medium__THINKING_BUDGET_TOKENS
              value: "1024"
            - name: DIALECTIC_LEVELS__medium__MAX_TOOL_ITERATIONS
              value: "15"
            - name: DIALECTIC_LEVELS__high__PROVIDER
              value: openai
            - name: DIALECTIC_LEVELS__high__MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__high__THINKING_BUDGET_TOKENS
              value: "1024"
            - name: DIALECTIC_LEVELS__high__MAX_TOOL_ITERATIONS
              value: "20"
            - name: DIALECTIC_LEVELS__max__PROVIDER
              value: openai
            - name: DIALECTIC_LEVELS__max__MODEL
              value: openrouter/owl-alpha
            - name: DIALECTIC_LEVELS__max__THINKING_BUDGET_TOKENS
              value: "2048"
            - name: DIALECTIC_LEVELS__max__MAX_TOOL_ITERATIONS
              value: "30"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: honcho-postgres
                  key: database
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@$(HONCHO_POSTGRES_SERVICE_HOST):$(HONCHO_POSTGRES_SERVICE_PORT)/$(DB_NAME)
            - name: HONCHO_BASE_URL
              value: https://inference-api.nousresearch.com/v1
