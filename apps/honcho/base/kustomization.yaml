apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "honcho", "tag-regex": "^(?P<version>.+)$" } ]'
images:
  - name: honcho
    newName: ghcr.io/plastic-labs/honcho
    newTag: v3.0.6
labels:
  - pairs:
      app.kubernetes.io/component: agent
      app.kubernetes.io/name: honcho
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: 3.0.6
resources:
  - deploy.yaml
  - svc.yaml
  - vpa.yaml