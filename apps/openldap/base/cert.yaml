apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openldap
spec:
  secretName: openldap-tls
  duration: 2160h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
  dnsNames:
    - openldap
    - openldap.shikanime.svc.cluster.local
  issuerRef:
    name: nishir
    kind: ClusterIssuer
