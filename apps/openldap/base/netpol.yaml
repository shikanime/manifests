apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openldap
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shikanime
      ports:
        - port: ldap
        - port: ldaps
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openldap
