apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: prowlarr-pkcs12-password
  namespace: shikanime
spec:
  approvePlan: auto
  interval: 30m
  path: ./modules/pkcs12-password
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  values:
    name: prowlarr-pkcs12-password
    namespace: shikanime
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: prowlarr-startup-config
  namespace: shikanime
spec:
  approvePlan: auto
  interval: 30m
  path: ./modules/prowlarr-config
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  values:
    name: prowlarr
    namespace: shikanime
    passwordSecretRef:
      name: prowlarr-pkcs12-password
