apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "prowlarr", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
configMapGenerator:
  - files:
      - rclone/rclone.conf
    name: prowlarr-rclone
    namespace: shikanime
images:
  - name: prowlarr
    newName: lscr.io/linuxserver/prowlarr
    newTag: 2.3.0
  - name: rclone
    newName: rclone/rclone
    newTag: 1.72.0
labels:
  - pairs:
      app.kubernetes.io/component: torrent-tracker
      app.kubernetes.io/name: prowlarr
      app.kubernetes.io/part-of: nishir-media
      app.kubernetes.io/version: v2.3.0
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
