apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-agent-honcho-generate-secret
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent-honcho
    spec:
      containers:
        - name: generate-jwt-secret
          image: hermes-agent-honcho
          command:
            - python
            - scripts/generate_jwt_secret.py
          envFrom:
            - secretRef:
                name: hermes-agent-honcho
      restartPolicy: Never
