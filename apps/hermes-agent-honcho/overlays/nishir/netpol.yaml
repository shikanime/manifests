apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agent-honcho
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent-honcho
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hermes-agent
      ports:
        - port: http
