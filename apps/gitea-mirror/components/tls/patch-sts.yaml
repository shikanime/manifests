apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea-mirror
spec:
  template:
    spec:
      containers:
        - name: gitea-mirror
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/nishir-ca-certificates.crt
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: tls
              mountPath: /etc/ssl/private
              readOnly: true
