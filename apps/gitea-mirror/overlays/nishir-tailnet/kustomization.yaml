resources:
  - ../nishir
  - netpol.yaml
  - ingress.yaml
namespace: shikanime
patches:
  - path: patch-sts.yaml
  - path: patch-sts-oidc.yaml
secretGenerator:
  - name: gitea-mirror
    envs:
      - gitea-mirror/.enc.env
  - name: gitea-mirror-oidc
    envs:
      - gitea-mirror/oidc.enc.env
labels:
  - includeTemplates: true
    pairs:
      app.kubernetes.io/component: version-control-server
      app.kubernetes.io/instance: gitea-mirror
      app.kubernetes.io/name: gitea-mirror
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: 3.17.1
