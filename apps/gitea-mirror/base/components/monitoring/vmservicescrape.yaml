apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: gitea-mirror
  namespace: shikanime
  labels:
    app.kubernetes.io/name: gitea-mirror
    app.kubernetes.io/part-of: gitea-mirror
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: http
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: gitea-mirror
      app.kubernetes.io/name: gitea-mirror