apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "gitea-mirror", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
images:
  - name: gitea-mirror
    newName: ghcr.io/raylabshq/gitea-mirror
    newTag: latest
labels:
  - pairs:
      app.kubernetes.io/component: version-control-server
      app.kubernetes.io/name: gitea-mirror
      app.kubernetes.io/part-of: nishir-platform
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
