apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea-mirror
spec:
  replicas: 1
  serviceName: gitea-mirror
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-mirror
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-mirror
    spec:
      containers:
        - name: gitea-mirror
          image: gitea-mirror
          env:
            - name: AUTO_MIRROR_REPOS
              value: "true"
            - name: CLEANUP_ENABLED
              value: "true"
            - name: GITEA_LFS
              value: "true"
            - name: GITEA_ORGANIZATION
              value: infinity-blackmirror
            - name: GITEA_PRESERVE_VISIBILITY
              value: "true"
            - name: GITEA_URL
              value: https://forgejo
            - name: INCLUDE_ARCHIVED
              value: "true"
            - name: MIRROR_ISSUES
              value: "true"
            - name: MIRROR_LABELS
              value: "true"
            - name: MIRROR_METADATA
              value: "true"
            - name: MIRROR_MILESTONES
              value: "true"
            - name: MIRROR_ORGANIZATIONS
              value: "true"
            - name: MIRROR_PULL_REQUESTS
              value: "true"
            - name: MIRROR_RELEASES
              value: "true"
            - name: MIRROR_WIKI
              value: "true"
            - name: PRIVATE_REPOSITORIES
              value: "true"
            - name: PRESERVE_ORG_STRUCTURE
              value: "true"
            - name: SCHEDULE_ENABLED
              value: "true"
          ports:
            - containerPort: 4321
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 180
          volumeMounts:
            - name: data
              mountPath: /app/data
      securityContext:
        fsGroup: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-mirror-data
