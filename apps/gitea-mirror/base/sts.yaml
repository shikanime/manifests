apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea-mirror
spec:
  replicas: 1
  serviceName: gitea-mirror
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-mirror
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-mirror
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/part-of
                      operator: NotIn
                      values:
                        - nishir-platform
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - name: gitea-mirror
          image: gitea-mirror
          env:
            - name: MIRROR_ISSUES
              value: "true"
            - name: MIRROR_WIKI
              value: "true"
            - name: MIRROR_ORGANIZATIONS
              value: "true"
            - name: PRESERVE_ORG_STRUCTURE
              value: "true"
            - name: GITEA_URL
              value: https://forge
            - name: SCHEDULE_ENABLED
              value: "true"
          ports:
            - containerPort: 4321
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /app/data
      securityContext:
        fsGroup: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-mirror-data
