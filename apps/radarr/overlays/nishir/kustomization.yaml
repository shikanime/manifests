---
resources:
  - ../../base
  - cert.yaml
  - netpol.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shikanime
components:
  - ../../components/tls
configurations:
  - namereference.yaml
patches:
  - path: patch-ingress.yaml
  - path: patch-pvc.yaml
  - path: patch-sts.yaml
secretGenerator:
  - name: radarr
    files:
      - config.xml=radarr/config.enc.xml
  - name: radarr-pkcs12-password
    envs:
      - radarr/.enc.env
