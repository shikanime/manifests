apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radarr
spec:
  template:
    spec:
      containers:
        - name: radarr
          livenessProbe:
            httpGet:
              port: https
              scheme: HTTPS
          ports:
            - name: https
              containerPort: 9898
          readinessProbe:
            httpGet:
              port: https
              scheme: HTTPS
          startupProbe:
            httpGet:
              port: https
              scheme: HTTPS
          volumeMounts:
            - name: tls
              mountPath: /etc/ssl/private
              readOnly: true
      volumes:
        - name: tls
          secret:
            items:
              - key: keystore.p12
                mode: "0640"
                path: keystore.p12
            secretName: radarr-tls
