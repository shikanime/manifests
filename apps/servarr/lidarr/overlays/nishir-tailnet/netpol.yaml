apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lidarr-tailscale
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale-system
      ports:
        - port: https
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: lidarr
      app.kubernetes.io/name: lidarr
  policyTypes:
    - Ingress
