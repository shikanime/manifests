apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sonarr-tls
spec:
  commonName: sonarr
  dnsNames:
    - sonarr
  issuerRef:
    name: nishir
    kind: ClusterIssuer
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: sonarr-pkcs12-password
        key: password
      profile: Modern2023
  secretName: sonarr-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
