---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gitea-mirror
      ports:
        - port: http
        - port: ssh
