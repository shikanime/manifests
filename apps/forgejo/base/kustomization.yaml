---
resources:
  - ingress.yaml
  - netpol.yaml
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "forgejo", "tag-regex":
      "^(?P<version>\\d+\\.\\d+\\.\\d+-rootless)$" }, { "name": "rclone",
      "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+.*)$" } ]'
images:
  - name: rclone
    newName: rclone/rclone
    newTag: 1.72.0
  - name: forgejo
    newName: codeberg.org/forgejo/forgejo
    newTag: 14.0.2-rootless
configMapGenerator:
  - name: forgejo-rclone
    namespace: shikanime
    files:
      - rclone/rclone.conf
labels:
  - includeTemplates: true
    pairs:
      app.kubernetes.io/component: version-control-server
      app.kubernetes.io/instance: forgejo
      app.kubernetes.io/name: forgejo
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: 14.0.2
