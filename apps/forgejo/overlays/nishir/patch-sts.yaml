---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo
spec:
  template:
    spec:
      containers:
        - name: forgejo
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
      volumes:
        - name: certs
          configMap:
            name: nishir-ca-certificates.crt
