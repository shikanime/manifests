---
resources:
  - ingress.yaml
  - netpol.yaml
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "alpine", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" },
      { "name": "qbittorrent", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$",
      "exclude-tags": ["20.04.1", "14.3.9"] } ]'
images:
  - name: alpine
    newName: alpine
    newTag: 3.21.2
  - name: qbittorrent
    newName: qbittorrentofficial/qbittorrent-nox
    newTag: 5.1.4-2
  - name: qbittorrent-resume
    newName: ghcr.io/shikanime/manifests/qbittorrent-resume
    newTag: latest
secretGenerator:
  - name: qbittorrent
    envs:
      - qbittorrent/.enc.env
