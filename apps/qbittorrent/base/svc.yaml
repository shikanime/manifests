apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: shikanime
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: qbittorrent
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-internal
  namespace: shikanime
  annotations:
    tailscale.com/hostname: qbittorrent-internal
    tailscale.com/tags: tag:qbittorrent
spec:
  loadBalancerClass: tailscale
  ports:
    - name: bittorrent
      port: 6881
      targetPort: bittorrent
  selector:
    app.kubernetes.io/name: qbittorrent
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-upd
  namespace: shikanime
spec:
  ports:
    - name: bittorrent
      protocol: UDP
      port: 6881
      targetPort: bittorrent-udp
  selector:
    app.kubernetes.io/name: qbittorrent
