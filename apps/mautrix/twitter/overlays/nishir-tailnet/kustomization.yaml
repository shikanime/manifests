---
resources:
  - ../nishir
  - netpol.yaml
  - proxyclass.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shikanime
patches:
  - path: patch-ingress.yaml
secretGenerator:
  - name: mautrix-twitter
    files:
      - config.yaml=matrix-twitter/config.enc.yaml
      - doublepuppet.yaml=matrix-twitter/doublepuppet.enc.yaml
      - registration.yaml=matrix-twitter/registration.enc.yaml
    options:
      disableNameSuffixHash: true
