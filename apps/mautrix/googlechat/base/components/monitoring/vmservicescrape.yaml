apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: mautrix-googlechat
  namespace: shikanime
  labels:
    app.kubernetes.io/name: mautrix-googlechat
    app.kubernetes.io/part-of: mautrix-googlechat
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: http
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-googlechat
      app.kubernetes.io/name: mautrix-googlechat