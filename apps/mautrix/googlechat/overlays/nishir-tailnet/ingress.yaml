apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matrix-googlechat
  annotations:
    tailscale.com/tags: tag:web
spec:
  defaultBackend:
    service:
      name: mautrix-googlechat
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - matrix-googlechat
