---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mautrix-discord-tailscale
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-discord
      app.kubernetes.io/name: mautrix-discord
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale-system
      ports:
        - port: http
