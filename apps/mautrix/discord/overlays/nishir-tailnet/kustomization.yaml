apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  - path: patch-ingress.yaml
resources:
  - ../nishir
  - netpol.yaml
  - proxyclass.yaml
secretGenerator:
  - files:
      - config.yaml=matrix-discord/config.enc.yaml
      - doublepuppet.yaml=matrix-discord/doublepuppet.enc.yaml
      - registration.yaml=matrix-discord/registration.enc.yaml
    name: matrix-discord
    options:
      disableNameSuffixHash: true
