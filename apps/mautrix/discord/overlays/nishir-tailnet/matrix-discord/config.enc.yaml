      initial:
        channel: 50
        dm: 50
        thread: 50
      missed:
        channel: 500
        dm: 500
        thread: 500
    max_guild_members: -1
  cache_media: unencrypted
  channel_name_template:
    "{{if or (eq .Type 3) (eq .Type 4)}}{{.Name}}{{else}}#{{.Name}}{{end}}"
  command_prefix: "!discord"
  custom_emoji_reactions: true
  delete_guild_on_leave: true
  delete_portal_on_channel_delete: false
  delivery_receipts: false
  direct_media:
    allow_proxy: true
    enabled: false
    server_key: ENC[AES256_GCM,data:Rp7m2dstFZwvlwh14cdN/qKI6vHWh7vojzE/GIl+EFFs4hZvbV3j2CesnEUGObs4MCQlSee6gfcURg==,iv:YtEjkRZY4YfU26SxDEwOFfSe7WLaMznBwmTOCMd1Dwc=,tag:QWIrrDTGy4dYyQTGVIugMw==,type:str]
