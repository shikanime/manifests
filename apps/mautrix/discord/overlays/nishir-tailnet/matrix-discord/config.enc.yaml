bridge:
  animated_sticker:
    args:
      fps: 25
      height: 320
      width: 320
    target: webp
  autojoin_thread_on_open: true
  avatar_proxy_key: ENC[AES256_GCM,data:wAKtbTu4xBgEIDJx+CKcczprY+7ngtppyHyHPQ7WN5M=,iv:Gi8495u7ke3nnpc5AFGEu05W32SOoyPBHjePZZpX9Jg=,tag:AFi2sezyWPNm2GV08LRSCw==,type:str]
