  sync_direct_chat_list: false
  use_discord_cdn_upload: true
  username_template: discord_{{.}}
homeserver:
  address: https://synapse:8448
  async_media: false
  domain: matrix.taila659a.ts.net
  message_send_checkpoint_endpoint: null
  ping_interval_seconds: 0
  software: standard
