  message_error_notices: true
  message_status_events: false
  mute_channels_on_create: false
  permissions:
    "*": relay
    "@root:matrix.taila659a.ts.net": admin
    matrix.taila659a.ts.net: user
  portal_message_buffer: 128
  prefix_webhook_messages: true
  private_chat_portal_meta: default
  provisioning:
    debug_endpoints: false
    prefix: /_matrix/provision
    shared_secret: ENC[AES256_GCM,data:aGT6JEM5X4+HqWpH0OXptdDhBBRk6AkyFEF5xx7tynz91HGa34KSJQa7tcYjSg1Ev/pATBJ9iGPIWCHktF9wdA==,iv:xmQiQlDsnmxPgQ7NT+7dXtBAB7VbNJVQLr2ELW07N+A=,tag:UNquxX8fdOLZowgeS5iCVQ==,type:str]
