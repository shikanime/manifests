apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mautrix-linkedin
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-linkedin
      app.kubernetes.io/name: mautrix-linkedin
  policyTypes:
    - Ingress
