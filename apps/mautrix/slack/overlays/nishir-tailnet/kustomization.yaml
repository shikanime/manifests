apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../nishir
secretGenerator:
  - files:
      - config.yaml=matrix-slack/config.enc.yaml
      - doublepuppet.yaml=matrix-slack/doublepuppet.enc.yaml
      - registration.yaml=matrix-slack/registration.enc.yaml
    name: matrix-slack
    options:
      disableNameSuffixHash: true
