---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mautrix-slack
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-slack
      app.kubernetes.io/name: mautrix-slack
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
      ports:
        - port: http
