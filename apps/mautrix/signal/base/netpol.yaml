apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mautrix-signal
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse-proxy
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-signal
      app.kubernetes.io/name: mautrix-signal
  policyTypes:
    - Ingress
