apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mautrix-meta
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse-proxy
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: mautrix-meta
      app.kubernetes.io/name: mautrix-meta
  policyTypes:
    - Ingress
