apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: muatrix-meta
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: muatrix-meta
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
      ports:
        - port: http
