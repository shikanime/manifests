---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: hermes-agent-postgres
      app.kubernetes.io/name: hermes-agent-postgres
  serviceName: hermes-agent-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: hermes-agent-postgres
        app.kubernetes.io/name: hermes-agent-postgres
    spec:
      containers:
        - name: postgres
          image: hermes-agent-postgres
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 180
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-postgres
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: run-postgresql
              mountPath: /run/postgresql
      volumes:
        - name: initdb
          configMap:
            name: hermes-agent-postgres
            items:
              - key: init.sql
                path: init.sql
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-postgres-data
        - name: run-postgresql
          emptyDir: {}
