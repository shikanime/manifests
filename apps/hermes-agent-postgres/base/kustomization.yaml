apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "hermes-agent-postgres", "tag-regex": "^(?P<version>.+)$" } ]'
configMapGenerator:
  - files:
      - hermes-agent-postgres/init.sql
    name: hermes-agent-postgres
images:
  - name: hermes-agent-postgres
    newName: pgvector/pgvector
    newTag: pg15
resources:
  - sts.yaml
  - svc.yaml
  - vpa.yaml
