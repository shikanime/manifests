---
resources:
  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "hermes-agent-postgres", "tag-regex": "^(?P<version>.+)$" } ]'
images:
  - name: hermes-agent-postgres
    newName: pgvector/pgvector
    newTag: pg15
configMapGenerator:
  - name: hermes-agent-postgres
    files:
      - hermes-agent-postgres/init.sql
