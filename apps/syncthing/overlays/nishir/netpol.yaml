apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: syncthing
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: syncthing
      app.kubernetes.io/name: syncthing
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rke2-traefik
      ports:
        - port: http
          protocol: TCP
        - port: sync
          protocol: TCP
        - port: sync-udp
          protocol: UDP
