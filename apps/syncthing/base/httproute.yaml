apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncthing
spec:
  hostnames:
    - syncthing.taila659a.ts.net
  parentRefs:
    - name: nishir
      sectionName: web
  rules:
    - backendRefs:
        - name: syncthing
          port: 8384
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncthing-https
spec:
  parentRefs:
    - name: nishir
      sectionName: websecure
  rules:
    - backendRefs:
        - name: syncthing
          port: 8384
