  - pvc.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
metadata:
  annotations:
    automata.shikanime.studio/images:
      '[ { "name": "syncthing", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$"
      } ]'
images:
  - name: syncthing
    newName: syncthing/syncthing
    newTag: 2.0.12
labels:
