apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: synapse
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: synapse
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-discord
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-googlechat
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-linkedin
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-meta
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-signal
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-slack
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-twitter
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-whatsapp
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse-proxy
      ports:
        - port: https
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: synapse-proxy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: synapse-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
      ports:
        - port: https
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: synapse
      ports:
        - port: https
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mautrix-discord
      ports:
        - port: http
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
