---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse
spec:
  replicas: 1
  serviceName: synapse
  selector:
    matchLabels:
      app.kubernetes.io/instance: synapse
      app.kubernetes.io/name: synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: synapse
        app.kubernetes.io/name: synapse
    spec:
      initContainers:
        - name: config-sync
          image: rclone
          args:
            - copy
            - --copy-links
            - --filter
            - "+ /*.log.config"
            - --filter
            - "+ /*.signing.key"
            - --filter
            - "+ /homeserver.yaml"
            - --filter
            - "- *"
            - /mnt/startup-config
            - /mnt/data
          volumeMounts:
            - name: data
              mountPath: /mnt/data
            - name: startup-config
              mountPath: /mnt/startup-config
              readOnly: true
            - name: rclone-config
              mountPath: /config/rclone/rclone.conf
              subPath: rclone.conf
              readOnly: true
          securityContext:
            capabilities:
              add:
                - FOWNER
        - name: appservices-config-sync
          image: rclone
          args:
            - copy
            - --copy-links
            - --filter
            - "+ /matrix-*.yaml"
            - --filter
            - "- *"
            - /mnt/startup-config
            - /mnt/data/appservices
          volumeMounts:
            - name: data
              mountPath: /mnt/data
            - name: startup-config
              mountPath: /mnt/startup-config
              readOnly: true
            - name: rclone-config
              mountPath: /config/rclone/rclone.conf
              subPath: rclone.conf
              readOnly: true
          securityContext:
            capabilities:
              add:
                - FOWNER
      containers:
        - name: synapse
          image: synapse
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            capabilities:
              add:
                - SETUID
                - SETGID
      securityContext:
        fsGroup: 991
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: synapse-data
        - name: rclone-config
          configMap:
            name: synapse-rclone
        - name: startup-config
          projected:
            sources:
              - secret:
                  name: synapse
                  items:
                    - key: homeserver.yaml
                      path: homeserver.yaml
                    - key: log.config
                      path: synapse.log.config
                    - key: signing.key
                      path: synapse.signing.key
        - name: appservices-startup-config
          projected:
            sources:
              - secret:
                  name: mautrix-discord
                  items:
                    - key: registration.yaml
                      path: matrix-discord.yaml
                    - key: doublepuppet.yaml
                      path: matrix-discord-doublepuppet.yaml
              - secret:
                  name: mautrix-googlechat
                  items:
                    - key: registration.yaml
                      path: matrix-googlechat.yaml
                    - key: doublepuppet.yaml
                      path: matrix-googlechat-doublepuppet.yaml
              - secret:
                  name: mautrix-linkedin
                  items:
                    - key: registration.yaml
                      path: matrix-linkedin.yaml
                    - key: doublepuppet.yaml
                      path: matrix-linkedin-doublepuppet.yaml
              - secret:
                  name: mautrix-meta
                  items:
                    - key: registration.yaml
                      path: matrix-meta.yaml
                    - key: doublepuppet.yaml
                      path: matrix-meta-doublepuppet.yaml
              - secret:
                  name: mautrix-signal
                  items:
                    - key: registration.yaml
                      path: matrix-signal.yaml
                    - key: doublepuppet.yaml
                      path: matrix-signal-doublepuppet.yaml
              - secret:
                  name: mautrix-slack
                  items:
                    - key: registration.yaml
                      path: matrix-slack.yaml
                    - key: doublepuppet.yaml
                      path: matrix-slack-doublepuppet.yaml
              - secret:
                  name: mautrix-twitter
                  items:
                    - key: registration.yaml
                      path: matrix-twitter.yaml
                    - key: doublepuppet.yaml
                      path: matrix-twitter-doublepuppet.yaml
              - secret:
                  name: mautrix-whatsapp
                  items:
                    - key: registration.yaml
                      path: matrix-whatsapp.yaml
                    - key: doublepuppet.yaml
                      path: matrix-whatsapp-doublepuppet.yaml
