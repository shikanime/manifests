apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: synapse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: synapse
  updatePolicy:
    updateMode: Auto
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: synapse-proxy
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synapse-proxy
  updatePolicy:
    updateMode: Auto
