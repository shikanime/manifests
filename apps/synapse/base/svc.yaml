apiVersion: v1
kind: Service
metadata:
  name: synapse
spec:
  ports:
    - name: http
      port: 8008
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: synapse
---
apiVersion: v1
kind: Service
metadata:
  name: synapse-proxy
spec:
  ports:
    - name: http
      port: 8008
      targetPort: http
  selector:
    app.kubernetes.io/name: synapse-proxy
