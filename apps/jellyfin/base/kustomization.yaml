apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "jellyfin", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
configMapGenerator:
  - files:
      - rclone/rclone.conf
    name: jellyfin-rclone
    namespace: shikanime
images:
  - name: jellyfin
    newName: jellyfin/jellyfin
    newTag: 10.11.5
  - name: rclone
    newName: rclone/rclone
    newTag: 1.72.0
labels:
  - pairs:
      app.kubernetes.io/component: media-server
      app.kubernetes.io/name: jellyfin
      app.kubernetes.io/part-of: nishir-media
      app.kubernetes.io/version: v10.11.5
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
