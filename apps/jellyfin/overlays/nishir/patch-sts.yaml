apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jellyfin
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - rpi5-large
                      - rpi4-large
              weight: 80
      containers:
        - name: jellyfin
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
            - name: movies-data
              mountPath: /data/movies
            - name: music-data
              mountPath: /data/music
            - name: shows-data
              mountPath: /data/shows
            - name: sukebe-data
              mountPath: /data/sukebe
            - name: timeline-data
              mountPath: /data/timeline
      volumes:
        - name: certs
          configMap:
            name: nishir-ca-certificates.crt
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: music-data
          persistentVolumeClaim:
            claimName: music-data
        - name: shows-data
          persistentVolumeClaim:
            claimName: shows-data
        - name: sukebe-data
          persistentVolumeClaim:
            claimName: sukebe-data
        - name: timeline-data
          persistentVolumeClaim:
            claimName: timeline-data
