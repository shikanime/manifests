apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgero
spec:
  replicas: 1
  serviceName: forgero
  selector:
    matchLabels:
      app.kubernetes.io/name: forgero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgero
    spec:
      initContainers:
        - name: config-sync
          image: rclone
          command:
            - rclone
          args:
            - copy
            - --copy-links
            - --update
            - /mnt/startup-config
            - /var/lib/gitea/data/gitea/conf
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea/data
            - name: rclone-config
              mountPath: /config/rclone/rclone.conf
              subPath: rclone.conf
              readOnly: true
            - name: config
              mountPath: /mnt/startup-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/part-of
                      operator: NotIn
                      values:
                        - nishir-platform
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - name: forgero
          image: forgero
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: TZ
              value: Europe/Paris
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 2222
              name: ssh
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 60
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea/data
      securityContext:
        fsGroup: 1000
      volumes:
        - name: config
          secret:
            secretName: forgero-config
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
