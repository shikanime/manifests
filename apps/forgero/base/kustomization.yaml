apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    automata.shikanime.studio/images: '[ { "name": "forgero", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" }, { "name": "rclone", "tag-regex": "^(?P<version>\\d+\\.\\d+\\.\\d+)$" } ]'
images:
  - name: rclone
    newName: docker.io/rclone/rclone
    newTag: 1.72.0
  - name: forgero
    newName: codeberg.org/forgejo/forgejo
    newTag: 14.0.2-rootless
labels:
  - pairs:
      app.kubernetes.io/component: version-control-server
      app.kubernetes.io/name: forgero
      app.kubernetes.io/part-of: nishir-platform
      app.kubernetes.io/version: v14.0.2
resources:
  - ingress.yaml
  - sts.yaml
  - svc.yaml
  - vpa.yaml
