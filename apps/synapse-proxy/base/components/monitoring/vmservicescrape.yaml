apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: synapse-proxy
  namespace: shikanime
  labels:
    app.kubernetes.io/name: synapse-proxy
    app.kubernetes.io/part-of: synapse-proxy
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: http
      scrapeTimeout: 30s
  namespaceSelector:
    matchNames:
      - shikanime
  selector:
    matchLabels:
      app.kubernetes.io/instance: synapse-proxy
      app.kubernetes.io/name: synapse-proxy