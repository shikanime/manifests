apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse-proxy
    spec:
      enableServiceLinks: true
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - synapse
                        - matrix-discord
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - name: caddy
          image: caddy
          ports:
            - containerPort: 8008
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            failureThreshold: 180
          volumeMounts:
            - name: synapse-proxy
              mountPath: /etc/caddy
              readOnly: true
      volumes:
        - name: synapse-proxy
          configMap:
            name: synapse-proxy
