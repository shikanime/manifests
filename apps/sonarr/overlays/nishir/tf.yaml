apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: sonarr-pkcs12-password
  namespace: shikanime
spec:
  approvePlan: auto
  interval: 30m
  path: ./modules/pkcs12-password
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  values:
    name: sonarr-pkcs12-password
    namespace: shikanime
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: sonarr-startup-config
  namespace: shikanime
spec:
  approvePlan: auto
  interval: 30m
  path: ./modules/sonarr-config
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  values:
    name: sonarr
    namespace: shikanime
    passwordSecretRef:
      name: sonarr-pkcs12-password
