apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: matrix
spec:
  template:
    spec:
      containers:
        - name: synapse
          readinessProbe:
            httpGet:
              port: https
              scheme: HTTPS
            initialDelaySeconds: 80
            timeoutSeconds: 20
            periodSeconds: 20
            failureThreshold: 15
          livenessProbe:
            httpGet:
              port: https
              scheme: HTTPS
            initialDelaySeconds: 150
            timeoutSeconds: 30
            periodSeconds: 30
            failureThreshold: 15
          startupProbe:
            httpGet:
              port: https
              scheme: HTTPS
            initialDelaySeconds: 20
            timeoutSeconds: 15
            periodSeconds: 10
            failureThreshold: 120
          volumeMounts:
            - name: certs
              mountPath: /etc/ssl/certs
              readOnly: true
      volumes:
        - name: certs
          configMap:
            name: nishir-ca-certificates.crt
        - name: tls
          secret:
            secretName: matrix-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
                mode: 0640
---
