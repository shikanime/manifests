jobs:
  nix:
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    uses: ./.github/workflows/nix.yaml
    with:
      cachix-name: shikanime
  release-branch:
    if:
      (startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref_name, '.0'))
      || (github.event_name == 'workflow_dispatch' &&
      startsWith(github.event.inputs.ref_name, 'v') &&
      endsWith(github.event.inputs.ref_name, '.0'))
    needs:
      - skaffold
      - nix
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OPERATOR_APP_ID }}
          permission-contents: write
          permission-workflows: write
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: shikanime-studio/actions/nix/setup@v9
        with:
          github-token:
            ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
            }}
      - uses: shikanime-studio/actions/checkout@v9
        with:
          github-token:
            ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
            }}
      - env:
          REF_NAME: ${{ github.ref_name || github.event.inputs.ref_name }}
        run:
          git push origin "HEAD:refs/heads/release-$(printf '%s' "$REF_NAME" |
          sed -e 's/^v//' -e 's/[.][^.]*$//')"
  release-tag:
    if:
      (startsWith(github.ref, 'refs/tags/v')) || (github.event_name ==
      'workflow_dispatch' && startsWith(github.event.inputs.ref_name, 'v'))
    needs:
      - skaffold
      - nix
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - continue-on-error: true
        id: createGithubAppToken
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OPERATOR_APP_ID }}
          permission-contents: write
          permission-workflows: write
          private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
      - uses: shikanime-studio/actions/nix/setup@v9
        with:
          github-token:
            ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
            }}
      - uses: shikanime-studio/actions/checkout@v9
        with:
          github-token:
            ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
            }}
      - env:
          GH_TOKEN:
            ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
            }}
          REF_NAME: ${{ github.ref_name || github.event.inputs.ref_name }}
        run:
          gh release create "$REF_NAME" --repo "${{ github.repository }}"
          --generate-notes || true
  skaffold:
    permissions:
      contents: read
      packages: write
    secrets:
      OPERATOR_PRIVATE_KEY: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    uses: ./.github/workflows/skaffold.yaml
name: Release
"on":
  push:
    branches:
      - main
      - release-[0-9]+.[0-9]+
    tags:
      - v?[0-9]+.[0-9]+.[0-9]+*
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
      OPERATOR_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      ref_name:
        description: Tag or branch to release
        required: true
permissions:
  contents: read
