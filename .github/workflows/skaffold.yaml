jobs:
  render:
    if: ${{ needs['setup-profiles-jobs'].outputs.continue == 'true' }}
    name: Render
    needs:
    - setup-profiles-jobs
    runs-on: ubuntu-latest
    steps:
    - continue-on-error: true
      id: createGithubAppToken
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ vars.OPERATOR_APP_ID }}
        permission-contents: read
        private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
        token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
          }}
    - uses: shikanime-studio/actions/nix/setup@v8
      with:
        github-token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
          }}
    - uses: shikanime-studio/actions/direnv@v8
    - run: skaffold build --profile ${{ matrix.profile }}
    - env:
        SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      run: skaffold render --profile ${{ matrix.profile }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs['setup-profiles-jobs'].outputs.matrix) }}
  setup-profiles-jobs:
    name: Setup Profiles Jobs
    outputs:
      continue: ${{ steps.setup-profiles-jobs.outputs.continue }}
      matrix: ${{ steps.setup-profiles-jobs.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
    - continue-on-error: true
      id: createGithubAppToken
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ vars.OPERATOR_APP_ID }}
        permission-contents: read
        private-key: ${{ secrets.OPERATOR_PRIVATE_KEY }}
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
        token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
          }}
    - uses: shikanime-studio/actions/nix/setup@v8
      with:
        github-token: ${{ steps.createGithubAppToken.outputs.token || secrets.GITHUB_TOKEN
          }}
    - id: setup-profiles-jobs
      uses: shikanime-studio/actions/skaffold/setup-profiles-jobs@v8
name: Skaffold
'on':
  workflow_call:
    secrets:
      OPERATOR_PRIVATE_KEY:
        required: true
      SOPS_AGE_KEY:
        required: true
permissions:
  contents: read
